<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="Street Drive 3D — escolha seu carro, vença corridas e desbloqueie novas pistas! Jogo grátis da Cogumelo Games!">
    <meta property="og:title" content="Street Drive 3D — Cogumelo Games">
    <meta property="og:description" content="Corrida 3D com 6 carros, 5 pistas e campeonato! Desvie do tráfego e chegue primeiro!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cogumelogames.com.br/space/">
    <link rel="canonical" href="https://cogumelogames.com.br/space/">
    <title>Street Drive 3D — Cogumelo Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #menu { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; flex-direction: column; align-items: center; justify-content: safe center; gap: 15px; z-index: 100; overflow-y: auto; padding: 20px; }
        #menu h1 { font-size: 48px; font-weight: 900; background: linear-gradient(to right, #ff4444, #ff8800, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }
        #menu .subtitle { color: #666; font-size: 13px; letter-spacing: 4px; }
        .section-title { color: #fff; font-size: 16px; font-weight: bold; letter-spacing: 2px; margin-top: 10px; }
        .car-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 600px; width: 95%; }
        .car-card { background: rgba(20,20,50,0.9); border: 3px solid #333; border-radius: 12px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
        .car-card:hover { border-color: #ff8800; transform: scale(1.03); }
        .car-card.selected { border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.4); }
        .car-card.locked { opacity: 0.5; pointer-events: none; }
        .car-card .car-emoji { font-size: 28px; }
        .car-card .car-name { color: #fff; font-size: 11px; font-weight: bold; margin: 4px 0; }
        .car-card .car-stat { color: #aaa; font-size: 9px; }
        .car-card .lock-icon { position: absolute; top: 5px; right: 5px; font-size: 12px; }
        .track-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 600px; width: 95%; }
        .track-card { background: rgba(20,20,50,0.9); border: 2px solid #333; border-radius: 10px; padding: 10px 6px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
        .track-card:hover { border-color: #00ccff; transform: scale(1.03); }
        .track-card.selected { border-color: #ffcc00; box-shadow: 0 0 12px rgba(255,204,0,0.4); }
        .track-card.locked { opacity: 0.4; pointer-events: none; }
        .track-card .track-emoji { font-size: 22px; }
        .track-card .track-name { color: #fff; font-size: 10px; margin-top: 4px; }
        .track-card .lock-icon { position: absolute; top: 3px; right: 3px; font-size: 10px; }
        #start-btn { padding: 14px 50px; font-size: 20px; font-weight: bold; background: linear-gradient(135deg, #ff4444, #ff8800); color: #fff; border: none; border-radius: 30px; cursor: pointer; letter-spacing: 2px; }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 5px 30px rgba(255,68,68,0.4); }
        .controls-hint { color: #444; font-size: 11px; }
        .progress-info { color: #ffcc00; font-size: 13px; }
        #hud { position: fixed; top: 12px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 15px; pointer-events: none; z-index: 50; }
        #hud span { color: #fff; font-size: 14px; font-weight: bold; font-family: monospace; text-shadow: 0 0 5px rgba(0,0,0,0.8); background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 8px; }
        #speedometer { position: fixed; bottom: 20px; right: 20px; color: #fff; font-size: 28px; font-weight: bold; font-family: monospace; text-shadow: 0 0 10px rgba(255,68,68,0.5); z-index: 50; background: rgba(0,0,0,0.7); padding: 8px 14px; border-radius: 12px; border: 2px solid #ff4444; }
        #position-display { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 24px; font-weight: bold; font-family: monospace; z-index: 50; text-shadow: 0 0 10px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 10px; }
        #race-result { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 200; }
        #race-result h1 { font-size: 48px; }
        #race-result p { color: #aaa; font-size: 18px; }
        #race-result .reward { color: #ffcc00; font-size: 20px; font-weight: bold; }
        #race-result button { padding: 14px 50px; font-size: 18px; font-weight: bold; background: #ff4444; color: #fff; border: none; border-radius: 25px; cursor: pointer; }
        #race-result button:hover { transform: scale(1.05); }
        .pos-1 { color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .pos-2 { color: #c0c0c0; }
        .pos-3 { color: #cd7f32; }
        @media (max-width: 600px) {
            #menu h1 { font-size: 32px; }
            .car-grid { grid-template-columns: repeat(2, 1fr); }
            .track-grid { grid-template-columns: repeat(3, 1fr); }
            #speedometer { font-size: 20px; bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="menu">
        <h1>STREET DRIVE</h1>
        <div class="subtitle">COGUMELO GAMES</div>
        <div class="progress-info" id="progress-info"></div>
        <div class="section-title">ESCOLHA SEU CARRO</div>
        <div class="car-grid" id="car-grid"></div>
        <div class="section-title">PISTA</div>
        <div class="track-grid" id="track-grid"></div>
        <button id="start-btn">CORRER! 🏁</button>
        <div class="controls-hint">A/D = Virar | W = Acelerar | S = Frear</div>
    </div>
    <div id="hud" style="display:none">
        <span id="hud-lap">Volta 1/3</span>
        <span id="hud-pos">1º / 4</span>
    </div>
    <div id="speedometer" style="display:none">0 km/h</div>
    <div id="position-display" style="display:none">1º</div>
    <div id="race-result">
        <h1 id="result-title">1º LUGAR!</h1>
        <p id="result-time"></p>
        <p id="result-reward" class="reward"></p>
        <button id="result-btn">MENU</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
// === CARS ===
const CARS = [
    { id: 'fusca', name: 'Fusca', emoji: '🚗', color: 0x2266cc, speed: 2.0, accel: 0.012, handling: 0.8, desc: 'Clássico brasileiro', unlock: 0 },
    { id: 'civic', name: 'Civic', emoji: '🚙', color: 0x888888, speed: 2.8, accel: 0.015, handling: 0.9, desc: 'Rápido e estável', unlock: 0 },
    { id: 'mustang', name: 'Mustang', emoji: '🏎️', color: 0xcc2222, speed: 3.5, accel: 0.018, handling: 0.7, desc: 'Potência bruta', unlock: 2 },
    { id: 'lambo', name: 'Lambo', emoji: '🔶', color: 0xff8800, speed: 4.2, accel: 0.022, handling: 0.75, desc: 'Supercarro!', unlock: 4 },
    { id: 'f1', name: 'Fórmula 1', emoji: '🏁', color: 0x11aa11, speed: 5.0, accel: 0.028, handling: 0.95, desc: 'O mais rápido', unlock: 7 },
    { id: 'cyber', name: 'Cybertruck', emoji: '🔷', color: 0xaaaacc, speed: 3.0, accel: 0.014, handling: 0.6, desc: 'Tanque elétrico', unlock: 3 },
];

// === TRACKS ===
const TRACKS = [
    { id: 'cidade', name: 'Cidade', emoji: '🏙️', laps: 2, length: 600, traffic: 3, sky: 0x87ceeb, ground: 0x3d8c3d, road: 0x2a2a2a, unlock: 0 },
    { id: 'praia', name: 'Praia', emoji: '🏖️', laps: 2, length: 700, traffic: 2, sky: 0x4dc9f6, ground: 0xc2b280, road: 0x3a3a2a, unlock: 1 },
    { id: 'noite', name: 'Noite', emoji: '🌙', laps: 3, length: 600, traffic: 4, sky: 0x0a0a2a, ground: 0x1a3a1a, road: 0x1a1a1a, unlock: 3 },
    { id: 'neve', name: 'Neve', emoji: '❄️', laps: 2, length: 800, traffic: 2, sky: 0xddeeff, ground: 0xeeeeff, road: 0x444455, unlock: 5 },
    { id: 'vulcao', name: 'Vulcão', emoji: '🌋', laps: 3, length: 700, traffic: 5, sky: 0x331111, ground: 0x2a1a0a, road: 0x1a1a1a, unlock: 8 },
];

// === PROGRESS ===
let progress = loadProgress();
function loadProgress() {
    try {
        const d = JSON.parse(localStorage.getItem('street_drive_progress'));
        if (d) return d;
    } catch(e) {}
    return { wins: 0, unlockedCars: ['fusca', 'civic'], unlockedTracks: ['cidade'], selectedCar: 0, selectedTrack: 0 };
}
function saveProgress() { localStorage.setItem('street_drive_progress', JSON.stringify(progress)); }

// === THREE.JS SETUP ===
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

let scene, camera, sunLight, hemiLight;

function setupScene(track) {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(track.sky, 0.005);
    renderer.setClearColor(track.sky);

    camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);

    hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
    scene.add(hemiLight);
    sunLight = new THREE.DirectionalLight(track.id === 'noite' ? 0x4466aa : 0xfff4e0, track.id === 'noite' ? 0.4 : 1.2);
    sunLight.position.set(-30, 50, -20);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 1;
    sunLight.shadow.camera.far = 200;
    sunLight.shadow.camera.left = -60;
    sunLight.shadow.camera.right = 60;
    sunLight.shadow.camera.top = 60;
    sunLight.shadow.camera.bottom = -60;
    scene.add(sunLight);
    scene.add(sunLight.target);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(600, 600);
    const groundMat = new THREE.MeshStandardMaterial({ color: track.ground, roughness: 0.95 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.05;
    ground.receiveShadow = true;
    scene.add(ground);
}

// === ROAD ===
const ROAD_WIDTH = 14;
const ROAD_SEG_LEN = 24;
const VISIBLE_SEGMENTS = 20;
let roadSegments = [];

function createTree(track) {
    const group = new THREE.Group();
    const trunkH = 1.5 + Math.random();
    const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, trunkH, 6);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3d1e, roughness: 0.9 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = trunkH / 2;
    trunk.castShadow = true;
    group.add(trunk);
    const leavesH = 2.5 + Math.random() * 1.5;
    const leavesGeo = new THREE.ConeGeometry(1.2 + Math.random() * 0.6, leavesH, 7);
    let leafColor = 0x2d6b2d;
    if (track.id === 'neve') leafColor = 0x1a4a1a;
    if (track.id === 'vulcao') leafColor = 0x4a3a1a;
    if (track.id === 'praia') leafColor = 0x3a8a2a;
    const leavesMat = new THREE.MeshStandardMaterial({ color: leafColor, roughness: 0.8, flatShading: true });
    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
    leaves.position.y = trunkH + leavesH / 2 - 0.3;
    leaves.castShadow = true;
    group.add(leaves);
    if (track.id === 'neve') {
        const snowGeo = new THREE.ConeGeometry(1.3, 0.5, 7);
        const snowMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
        const snow = new THREE.Mesh(snowGeo, snowMat);
        snow.position.y = trunkH + leavesH - 0.3;
        group.add(snow);
    }
    return group;
}

function buildRoad(track) {
    roadSegments = [];
    for (let i = 0; i < VISIBLE_SEGMENTS; i++) {
        const z = -i * ROAD_SEG_LEN;
        const group = new THREE.Group();

        const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_SEG_LEN);
        const roadMat = new THREE.MeshStandardMaterial({ color: track.road, roughness: 0.85, metalness: 0.05 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.set(0, 0.01, z);
        road.receiveShadow = true;
        group.add(road);

        const dashGeo = new THREE.PlaneGeometry(0.15, 2.5);
        const dashMat = new THREE.MeshBasicMaterial({ color: 0xdddddd });
        for (let d = -10; d <= 10; d += 6) {
            for (const lx of [-3.8, 3.8]) {
                const dash = new THREE.Mesh(dashGeo, dashMat);
                dash.rotation.x = -Math.PI / 2;
                dash.position.set(lx, 0.02, z + d);
                group.add(dash);
            }
        }

        const sideGeo = new THREE.PlaneGeometry(0.2, ROAD_SEG_LEN);
        const sideMat = new THREE.MeshBasicMaterial({ color: 0xddaa00 });
        const sideL = new THREE.Mesh(sideGeo, sideMat);
        sideL.rotation.x = -Math.PI / 2;
        sideL.position.set(-ROAD_WIDTH / 2 + 0.2, 0.02, z);
        group.add(sideL);
        const sideR = sideL.clone();
        sideR.position.set(ROAD_WIDTH / 2 - 0.2, 0.02, z);
        group.add(sideR);

        const curbGeo = new THREE.BoxGeometry(0.5, 0.15, ROAD_SEG_LEN);
        const curbMat = new THREE.MeshStandardMaterial({ color: 0x999999 });
        const curbL = new THREE.Mesh(curbGeo, curbMat);
        curbL.position.set(-ROAD_WIDTH / 2 - 0.25, 0.075, z);
        group.add(curbL);
        const curbR = curbL.clone();
        curbR.position.set(ROAD_WIDTH / 2 + 0.25, 0.075, z);
        group.add(curbR);

        const railGeo = new THREE.BoxGeometry(0.1, 0.6, ROAD_SEG_LEN);
        const railMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.7, roughness: 0.3 });
        const railL = new THREE.Mesh(railGeo, railMat);
        railL.position.set(-ROAD_WIDTH / 2 - 1, 0.4, z);
        group.add(railL);
        const railR = railL.clone();
        railR.position.set(ROAD_WIDTH / 2 + 1, 0.4, z);
        group.add(railR);

        for (let t = 0; t < 2; t++) {
            const tree = createTree(track);
            const side = Math.random() > 0.5 ? 1 : -1;
            tree.position.set(side * (ROAD_WIDTH / 2 + 3 + Math.random() * 10), 0, z + (Math.random() - 0.5) * ROAD_SEG_LEN);
            group.add(tree);
        }

        scene.add(group);
        roadSegments.push({ group, z });
    }
}

// === CAR MESH ===
function createCarMesh(color, scale) {
    const s = scale || 1;
    const group = new THREE.Group();
    const bodyGeo = new THREE.BoxGeometry(2.2 * s, 0.7 * s, 4.8 * s);
    const bodyMat = new THREE.MeshStandardMaterial({ color, metalness: 0.85, roughness: 0.15 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.65 * s;
    body.castShadow = true;
    group.add(body);

    const cabinGeo = new THREE.BoxGeometry(1.9 * s, 0.6 * s, 2.2 * s);
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.95, roughness: 0.05 });
    const cabin = new THREE.Mesh(cabinGeo, cabinMat);
    cabin.position.set(0, 1.2 * s, -0.1 * s);
    cabin.castShadow = true;
    group.add(cabin);

    const windGeo = new THREE.PlaneGeometry(1.7 * s, 0.5 * s);
    const windMat = new THREE.MeshStandardMaterial({ color: 0x4488bb, metalness: 0.9, roughness: 0.02, transparent: true, opacity: 0.6 });
    const windF = new THREE.Mesh(windGeo, windMat);
    windF.position.set(0, 1.25 * s, -1.3 * s);
    windF.rotation.x = 0.25;
    group.add(windF);

    const hlGeo = new THREE.BoxGeometry(0.4 * s, 0.12 * s, 0.06 * s);
    const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const hlL = new THREE.Mesh(hlGeo, hlMat);
    hlL.position.set(-0.7 * s, 0.7 * s, -2.42 * s);
    group.add(hlL);
    const hlR = hlL.clone();
    hlR.position.set(0.7 * s, 0.7 * s, -2.42 * s);
    group.add(hlR);

    const tlGeo = new THREE.BoxGeometry(0.5 * s, 0.08 * s, 0.06 * s);
    const tlMat = new THREE.MeshBasicMaterial({ color: 0xcc0000 });
    const tlL = new THREE.Mesh(tlGeo, tlMat);
    tlL.position.set(-0.6 * s, 0.7 * s, 2.42 * s);
    group.add(tlL);
    const tlR = tlL.clone();
    tlR.position.set(0.6 * s, 0.7 * s, 2.42 * s);
    group.add(tlR);

    const wheelGeo = new THREE.TorusGeometry(0.32 * s, 0.13 * s, 8, 14);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 });
    const positions = [[-1.1, 0.32, 1.5], [1.1, 0.32, 1.5], [-1.1, 0.32, -1.5], [1.1, 0.32, -1.5]];
    for (const [wx, wy, wz] of positions) {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.y = Math.PI / 2;
        wheel.position.set(wx * s, wy * s, wz * s);
        wheel.castShadow = true;
        group.add(wheel);
    }

    const shadowGeo = new THREE.PlaneGeometry(2.6 * s, 5 * s);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 });
    const shadow = new THREE.Mesh(shadowGeo, shadowMat);
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.y = 0.02;
    group.add(shadow);

    return group;
}

// === GAME STATE ===
const LANES = [-4, 0, 4];
let playing = false;
let playerMesh, aiMeshes = [];
let playerSpeed = 0, playerX = 0, playerSteer = 0;
let playerDist = 0, playerLap = 0, raceStartTime = 0;
let aiStates = [];
let keys = {};
let currentCar, currentTrack;
let totalRaceDist = 0;

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

let touchActive = false, touchX = 0, touchAccel = false;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchActive = true;
    touchX = e.touches[0].clientX;
    if (e.touches[0].clientY < window.innerHeight * 0.5) touchAccel = true;
});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (touchActive) touchX = e.touches[0].clientX; });
canvas.addEventListener('touchend', e => { e.preventDefault(); touchActive = false; touchAccel = false; });

// === MENU ===
function renderMenu() {
    const carGrid = document.getElementById('car-grid');
    carGrid.innerHTML = '';
    CARS.forEach((car, i) => {
        const unlocked = progress.unlockedCars.includes(car.id);
        const div = document.createElement('div');
        div.className = 'car-card' + (i === progress.selectedCar ? ' selected' : '') + (!unlocked ? ' locked' : '');
        div.innerHTML = `
            <div class="car-emoji">${car.emoji}</div>
            <div class="car-name">${car.name}</div>
            <div class="car-stat">Vel: ${'█'.repeat(Math.round(car.speed))}${'░'.repeat(5 - Math.round(car.speed))}</div>
            <div class="car-stat">Ctrl: ${'█'.repeat(Math.round(car.handling * 5))}${'░'.repeat(5 - Math.round(car.handling * 5))}</div>
            ${!unlocked ? `<div class="lock-icon">🔒</div><div class="car-stat" style="color:#ff8800">${car.unlock} vitórias</div>` : ''}
        `;
        if (unlocked) {
            div.onclick = () => { progress.selectedCar = i; saveProgress(); renderMenu(); };
        }
        carGrid.appendChild(div);
    });

    const trackGrid = document.getElementById('track-grid');
    trackGrid.innerHTML = '';
    TRACKS.forEach((track, i) => {
        const unlocked = progress.unlockedTracks.includes(track.id);
        const div = document.createElement('div');
        div.className = 'track-card' + (i === progress.selectedTrack ? ' selected' : '') + (!unlocked ? ' locked' : '');
        div.innerHTML = `
            <div class="track-emoji">${track.emoji}</div>
            <div class="track-name">${track.name}</div>
            ${!unlocked ? `<div class="lock-icon">🔒</div>` : ''}
        `;
        if (unlocked) {
            div.onclick = () => { progress.selectedTrack = i; saveProgress(); renderMenu(); };
        }
        trackGrid.appendChild(div);
    });

    document.getElementById('progress-info').textContent = `🏆 ${progress.wins} vitórias`;
}
renderMenu();

// === START RACE ===
function startRace() {
    currentCar = CARS[progress.selectedCar];
    currentTrack = TRACKS[progress.selectedTrack];
    totalRaceDist = currentTrack.length * currentTrack.laps;

    setupScene(currentTrack);
    buildRoad(currentTrack);

    // Player
    playerMesh = createCarMesh(currentCar.color);
    playerMesh.position.set(0, 0, 0);
    scene.add(playerMesh);
    playerSpeed = 0; playerX = 0; playerSteer = 0;
    playerDist = 0; playerLap = 0;

    // AI opponents (3)
    aiMeshes = []; aiStates = [];
    const aiColors = [0x888888, 0x444444, 0xaa6622];
    for (let i = 0; i < 3; i++) {
        const aiCar = CARS[Math.min(progress.selectedCar + 1, CARS.length - 1)];
        const mesh = createCarMesh(aiColors[i]);
        const startOffset = -(i + 1) * 8;
        mesh.position.set(LANES[i], 0, startOffset);
        scene.add(mesh);
        aiMeshes.push(mesh);
        aiStates.push({
            x: LANES[i],
            dist: -startOffset,
            speed: aiCar.speed * (0.7 + Math.random() * 0.2),
            targetLane: i,
            laneTimer: 0,
            lap: 0,
            finished: false
        });
    }

    raceStartTime = Date.now();
    document.getElementById('menu').style.display = 'none';
    document.getElementById('race-result').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('speedometer').style.display = 'block';
    document.getElementById('position-display').style.display = 'block';
    keys = {};
    playing = true;
    gameLoop();
}

// === GAME LOOP ===
function gameLoop() {
    if (!playing) return;
    requestAnimationFrame(gameLoop);

    // Player input
    if (keys['KeyW'] || keys['ArrowUp'] || touchAccel) {
        playerSpeed = Math.min(playerSpeed + currentCar.accel, currentCar.speed);
    } else if (keys['KeyS'] || keys['ArrowDown']) {
        playerSpeed = Math.max(playerSpeed - 0.04, 0);
    } else {
        playerSpeed *= 0.997;
    }

    // Steering
    const steerPower = currentCar.handling * 0.14;
    if (keys['KeyA'] || keys['ArrowLeft']) playerSteer = Math.min(playerSteer + 0.06, 1);
    else if (keys['KeyD'] || keys['ArrowRight']) playerSteer = Math.max(playerSteer - 0.06, -1);
    else playerSteer *= 0.88;

    // Touch steer
    if (touchActive && !touchAccel) {
        const center = window.innerWidth / 2;
        playerSteer = -(touchX - center) / (center * 0.5);
        playerSteer = Math.max(-1, Math.min(1, playerSteer));
    }

    playerX += -playerSteer * steerPower * (playerSpeed / currentCar.speed);
    playerX = Math.max(-12, Math.min(12, playerX));

    playerDist += playerSpeed * 0.5;

    // Lap detection
    const newLap = Math.floor(playerDist / currentTrack.length);
    if (newLap > playerLap) playerLap = newLap;
    if (playerLap >= currentTrack.laps) { endRace(true); return; }

    // Car visual
    playerMesh.position.x = playerX;
    playerMesh.rotation.y = playerSteer * 0.25;
    playerMesh.rotation.z = -playerSteer * 0.03;

    // Road movement
    for (const seg of roadSegments) {
        seg.group.position.z += playerSpeed;
        if (seg.group.position.z > ROAD_SEG_LEN * 2) {
            seg.group.position.z -= VISIBLE_SEGMENTS * ROAD_SEG_LEN;
        }
    }

    // AI
    for (let i = 0; i < aiStates.length; i++) {
        const ai = aiStates[i];
        if (ai.finished) continue;

        ai.dist += ai.speed * 0.5;
        const aiLap = Math.floor(ai.dist / currentTrack.length);
        if (aiLap >= currentTrack.laps) { ai.finished = true; ai.lap = currentTrack.laps; continue; }
        ai.lap = aiLap;

        // AI lane changes
        ai.laneTimer++;
        if (ai.laneTimer > 60 + Math.random() * 60) {
            ai.laneTimer = 0;
            ai.targetLane = Math.floor(Math.random() * 3);
        }
        const targetX = LANES[ai.targetLane];
        ai.x += (targetX - ai.x) * 0.03;

        // Position relative to player
        const relZ = -(ai.dist - playerDist);
        aiMeshes[i].position.set(ai.x, 0, relZ);
        aiMeshes[i].visible = Math.abs(relZ) < 120;
    }

    // Position calculation
    const allDists = [{ dist: playerDist, lap: playerLap, name: 'player' }];
    aiStates.forEach((ai, i) => allDists.push({ dist: ai.dist, lap: ai.lap, name: 'ai' + i }));
    allDists.sort((a, b) => (b.lap * 10000 + b.dist) - (a.lap * 10000 + a.dist));
    const rank = allDists.findIndex(d => d.name === 'player') + 1;

    // Check if all AI finished before player
    if (aiStates.every(ai => ai.finished) && playerLap < currentTrack.laps) {
        endRace(false);
        return;
    }

    // Camera
    const camH = 4.5 + playerSpeed * 0.4;
    const camD = 10 + playerSpeed * 0.5;
    camera.position.lerp(new THREE.Vector3(playerX * 0.35, camH, camD), 0.06);
    camera.lookAt(playerX * 0.4, 1, -18);
    camera.fov = 55 + playerSpeed * 4;
    camera.updateProjectionMatrix();

    sunLight.position.set(playerX - 30, 50, -20);
    sunLight.target.position.set(playerX, 0, -10);

    // Off-road penalty
    if (Math.abs(playerX) > ROAD_WIDTH / 2) {
        playerSpeed *= 0.98;
    }

    // HUD
    document.getElementById('hud-lap').textContent = `Volta ${Math.min(playerLap + 1, currentTrack.laps)}/${currentTrack.laps}`;
    document.getElementById('hud-pos').textContent = `${rank}º / 4`;
    document.getElementById('speedometer').textContent = Math.floor(playerSpeed * 80) + ' km/h';
    const posEl = document.getElementById('position-display');
    posEl.textContent = rank + 'º';
    posEl.className = rank === 1 ? 'pos-1' : rank === 2 ? 'pos-2' : rank === 3 ? 'pos-3' : '';

    renderer.render(scene, camera);
}

// === END RACE ===
function endRace(playerFinished) {
    playing = false;

    const allDists = [{ dist: playerDist, lap: playerLap, name: 'player' }];
    aiStates.forEach((ai, i) => allDists.push({ dist: ai.dist, lap: ai.lap, name: 'ai' + i }));
    allDists.sort((a, b) => (b.lap * 10000 + b.dist) - (a.lap * 10000 + a.dist));
    const rank = allDists.findIndex(d => d.name === 'player') + 1;

    const elapsed = Math.floor((Date.now() - raceStartTime) / 1000);
    const min = Math.floor(elapsed / 60);
    const sec = elapsed % 60;

    const titles = ['🏆 1º LUGAR!', '🥈 2º LUGAR!', '🥉 3º LUGAR!', '4º LUGAR...'];
    const classes = ['pos-1', 'pos-2', 'pos-3', ''];

    document.getElementById('result-title').textContent = titles[rank - 1];
    document.getElementById('result-title').className = classes[rank - 1];
    document.getElementById('result-time').textContent = `Tempo: ${min}:${sec.toString().padStart(2, '0')} | Pista: ${currentTrack.name}`;

    let reward = '';
    if (rank === 1) {
        progress.wins++;
        // Unlock new cars
        CARS.forEach(car => {
            if (car.unlock <= progress.wins && !progress.unlockedCars.includes(car.id)) {
                progress.unlockedCars.push(car.id);
                reward += `🔓 Desbloqueou: ${car.name}! `;
            }
        });
        // Unlock new tracks
        TRACKS.forEach(track => {
            if (track.unlock <= progress.wins && !progress.unlockedTracks.includes(track.id)) {
                progress.unlockedTracks.push(track.id);
                reward += `🔓 Nova pista: ${track.name}! `;
            }
        });
        if (!reward) reward = '+1 vitória!';
        saveProgress();
    } else {
        reward = 'Tente de novo para desbloquear mais!';
    }

    document.getElementById('result-reward').textContent = reward;
    document.getElementById('race-result').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('speedometer').style.display = 'none';
    document.getElementById('position-display').style.display = 'none';
}

// === EVENTS ===
document.getElementById('start-btn').onclick = startRace;
document.getElementById('result-btn').onclick = () => {
    document.getElementById('race-result').style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
    renderMenu();
};

// Menu ambient
function menuRender() {
    if (playing) return;
    requestAnimationFrame(menuRender);
    if (scene) renderer.render(scene, camera);
}
setupScene(TRACKS[0]);
buildRoad(TRACKS[0]);
camera.position.set(3, 5, 14);
camera.lookAt(0, 0, -15);
menuRender();

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    if (camera) { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); }
});
