<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="Space Drift — desvie de asteroides no espaço 3D! Colete energia, sobreviva o máximo possível. Jogo grátis da Cogumelo Games!">
    <meta property="og:title" content="Space Drift — Cogumelo Games">
    <meta property="og:description" content="Desvie de asteroides no espaço 3D! Quanto tempo você sobrevive?">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cogumelogames.com.br/space/">
    <link rel="canonical" href="https://cogumelogames.com.br/space/">
    <title>Space Drift — Cogumelo Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #menu { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at center, #0a0a3a 0%, #000011 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100; }
        #menu h1 { font-size: 52px; font-weight: 900; background: linear-gradient(to right, #00ccff, #ff00ff, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }
        #menu .subtitle { color: #666; font-size: 13px; letter-spacing: 4px; }
        #menu .best { color: #ffcc00; font-size: 16px; margin-top: 10px; }
        #start-btn { padding: 16px 60px; font-size: 22px; font-weight: bold; background: linear-gradient(135deg, #00ccff, #0066ff); color: #fff; border: none; border-radius: 30px; cursor: pointer; letter-spacing: 2px; }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 5px 30px rgba(0,204,255,0.4); }
        .controls-hint { color: #444; font-size: 12px; margin-top: 10px; }
        #hud { position: fixed; top: 15px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 50; }
        #hud span { color: #fff; font-size: 16px; font-weight: bold; font-family: monospace; text-shadow: 0 0 10px rgba(0,204,255,0.5); background: rgba(0,0,30,0.6); padding: 5px 14px; border-radius: 10px; }
        #shield-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; border: 1px solid #333; z-index: 50; overflow: hidden; }
        #shield-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00ccff); border-radius: 5px; width: 100%; transition: width 0.2s; }
        #shield-label { position: fixed; bottom: 34px; left: 50%; transform: translateX(-50%); color: #00ff88; font-size: 10px; font-family: monospace; z-index: 50; }
        #gameover { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 200; }
        #gameover h1 { font-size: 48px; color: #ff4444; text-shadow: 0 0 20px rgba(255,0,0,0.5); }
        #gameover p { color: #aaa; font-size: 18px; }
        #gameover .new-record { color: #ffcc00; font-size: 22px; font-weight: bold; text-shadow: 0 0 15px rgba(255,204,0,0.5); }
        #gameover button { padding: 14px 50px; font-size: 18px; font-weight: bold; background: #0066ff; color: #fff; border: none; border-radius: 25px; cursor: pointer; }
        #gameover button:hover { transform: scale(1.05); }
        @media (max-width: 600px) {
            #menu h1 { font-size: 36px; }
            #start-btn { padding: 14px 40px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="menu">
        <h1>SPACE DRIFT</h1>
        <div class="subtitle">COGUMELO GAMES</div>
        <div class="best" id="menu-best"></div>
        <button id="start-btn">DECOLAR 🚀</button>
        <div class="controls-hint">← → ou A/D = Mover | ↑ ↓ ou W/S = Subir/Descer</div>
    </div>
    <div id="hud" style="display:none">
        <span id="hud-score">0 pts</span>
        <span id="hud-speed">1.0x</span>
    </div>
    <div id="shield-bar" style="display:none"><div id="shield-fill"></div></div>
    <div id="shield-label" style="display:none">ESCUDO</div>
    <div id="gameover">
        <h1>DESTRUÍDO!</h1>
        <p id="go-score"></p>
        <p id="go-record" class="new-record" style="display:none">NOVO RECORDE!</p>
        <button id="go-btn">TENTAR DE NOVO</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000011);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000011, 60, 150);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 3, 12);
camera.lookAt(0, 0, -20);

const ambientLight = new THREE.AmbientLight(0x333355, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 10);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x00ccff, 1, 30);
pointLight.position.set(0, 2, 8);
scene.add(pointLight);

// Stars background
const starsGeo = new THREE.BufferGeometry();
const starsVerts = [];
for (let i = 0; i < 2000; i++) {
    starsVerts.push((Math.random() - 0.5) * 300, (Math.random() - 0.5) * 300, (Math.random() - 0.5) * 300);
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsVerts, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3 });
const stars = new THREE.Points(starsGeo, starsMat);
scene.add(stars);

// Player ship
function createShip() {
    const group = new THREE.Group();
    const bodyGeo = new THREE.ConeGeometry(0.6, 3, 6);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0088ff, metalness: 0.7, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.x = Math.PI / 2;
    group.add(body);
    const wingGeo = new THREE.BoxGeometry(3, 0.1, 1.2);
    const wingMat = new THREE.MeshStandardMaterial({ color: 0x004488, metalness: 0.5 });
    const wing = new THREE.Mesh(wingGeo, wingMat);
    wing.position.z = 0.5;
    group.add(wing);
    const cockpitGeo = new THREE.SphereGeometry(0.35, 8, 6);
    const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x003333, metalness: 0.9, roughness: 0.1 });
    const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
    cockpit.position.set(0, 0.3, -0.3);
    group.add(cockpit);
    const engineGeo = new THREE.CylinderGeometry(0.2, 0.35, 0.6, 8);
    const engineMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200 });
    const engine = new THREE.Mesh(engineGeo, engineMat);
    engine.rotation.x = Math.PI / 2;
    engine.position.z = 1.6;
    group.add(engine);
    return group;
}

// Asteroid
function createAsteroid() {
    const size = 0.8 + Math.random() * 2.5;
    const geo = new THREE.DodecahedronGeometry(size, 1);
    const verts = geo.attributes.position;
    for (let i = 0; i < verts.count; i++) {
        verts.setX(i, verts.getX(i) + (Math.random() - 0.5) * 0.4);
        verts.setY(i, verts.getY(i) + (Math.random() - 0.5) * 0.4);
        verts.setZ(i, verts.getZ(i) + (Math.random() - 0.5) * 0.4);
    }
    geo.computeVertexNormals();
    const colors = [0x665544, 0x887766, 0x554433, 0x776655];
    const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], roughness: 0.9, flatShading: true });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = { size, rotSpeed: { x: (Math.random() - 0.5) * 0.03, y: (Math.random() - 0.5) * 0.03 } };
    return mesh;
}

// Energy orb
function createOrb() {
    const geo = new THREE.SphereGeometry(0.4, 12, 8);
    const mat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00aa44, transparent: true, opacity: 0.8 });
    const mesh = new THREE.Mesh(geo, mat);
    const glowGeo = new THREE.SphereGeometry(0.6, 8, 6);
    const glowMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.2 });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    mesh.add(glow);
    return mesh;
}

// Game state
let ship, asteroids = [], orbs = [], playing = false;
let playerX = 0, playerY = 0, targetX = 0, targetY = 0;
let score = 0, shield = 100, gameSpeed = 1, spawnTimer = 0;
let best = parseInt(localStorage.getItem('space_drift_best') || '0');
let keys = {};

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
let touchStartX = 0, touchStartY = 0, touchActive = false;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchActive = true;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!touchActive) return;
    const dx = (e.touches[0].clientX - touchStartX) * 0.02;
    const dy = (e.touches[0].clientY - touchStartY) * 0.02;
    targetX = Math.max(-8, Math.min(8, dx * 3));
    targetY = Math.max(-4, Math.min(4, -dy * 3));
});
canvas.addEventListener('touchend', () => { touchActive = false; targetX = 0; targetY = 0; });

// Show best
if (best > 0) document.getElementById('menu-best').textContent = `Recorde: ${best} pts`;

function startGame() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameover').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('shield-bar').style.display = 'block';
    document.getElementById('shield-label').style.display = 'block';

    // Clear old
    if (ship) scene.remove(ship);
    asteroids.forEach(a => scene.remove(a));
    orbs.forEach(o => scene.remove(o));
    asteroids = [];
    orbs = [];

    ship = createShip();
    ship.position.set(0, 0, 0);
    scene.add(ship);

    playerX = 0; playerY = 0; targetX = 0; targetY = 0;
    score = 0; shield = 100; gameSpeed = 1; spawnTimer = 0;
    keys = {};
    playing = true;
    gameLoop();
}

function gameLoop() {
    if (!playing) return;
    requestAnimationFrame(gameLoop);

    // Input
    if (keys['KeyA'] || keys['ArrowLeft']) targetX -= 0.3;
    if (keys['KeyD'] || keys['ArrowRight']) targetX += 0.3;
    if (keys['KeyW'] || keys['ArrowUp']) targetY += 0.2;
    if (keys['KeyS'] || keys['ArrowDown']) targetY -= 0.2;
    targetX = Math.max(-8, Math.min(8, targetX));
    targetY = Math.max(-4, Math.min(4, targetY));

    // Smooth movement
    playerX += (targetX - playerX) * 0.08;
    playerY += (targetY - playerY) * 0.08;
    ship.position.x = playerX;
    ship.position.y = playerY;
    ship.rotation.z = -(targetX - playerX) * 0.5;
    ship.rotation.x = (targetY - playerY) * 0.3;

    // Gradually return to center
    if (!keys['KeyA'] && !keys['ArrowLeft'] && !keys['KeyD'] && !keys['ArrowRight'] && !touchActive) {
        targetX *= 0.98;
    }
    if (!keys['KeyW'] && !keys['ArrowUp'] && !keys['KeyS'] && !keys['ArrowDown'] && !touchActive) {
        targetY *= 0.98;
    }

    // Speed increases over time
    gameSpeed = 1 + score * 0.002;
    if (gameSpeed > 4) gameSpeed = 4;

    // Spawn asteroids
    spawnTimer++;
    const spawnRate = Math.max(10, 40 - score * 0.3);
    if (spawnTimer >= spawnRate) {
        spawnTimer = 0;
        const ast = createAsteroid();
        ast.position.set((Math.random() - 0.5) * 18, (Math.random() - 0.5) * 10, -100 - Math.random() * 30);
        scene.add(ast);
        asteroids.push(ast);

        // Spawn orb occasionally
        if (Math.random() < 0.2) {
            const orb = createOrb();
            orb.position.set((Math.random() - 0.5) * 14, (Math.random() - 0.5) * 6, -90 - Math.random() * 20);
            scene.add(orb);
            orbs.push(orb);
        }
    }

    // Move asteroids
    for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        a.position.z += 0.6 * gameSpeed;
        a.rotation.x += a.userData.rotSpeed.x;
        a.rotation.y += a.userData.rotSpeed.y;

        // Collision with player
        const dx = a.position.x - playerX;
        const dy = a.position.y - playerY;
        const dz = a.position.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (dist < a.userData.size + 1.2) {
            shield -= 35;
            scene.remove(a);
            asteroids.splice(i, 1);
            if (shield <= 0) { endGame(); return; }
            continue;
        }

        // Remove passed asteroids
        if (a.position.z > 15) {
            scene.remove(a);
            asteroids.splice(i, 1);
            score++;
        }
    }

    // Move orbs
    for (let i = orbs.length - 1; i >= 0; i--) {
        const o = orbs[i];
        o.position.z += 0.6 * gameSpeed;
        o.rotation.y += 0.05;

        const dx = o.position.x - playerX;
        const dy = o.position.y - playerY;
        const dz = o.position.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (dist < 2) {
            shield = Math.min(100, shield + 20);
            score += 5;
            scene.remove(o);
            orbs.splice(i, 1);
            continue;
        }

        if (o.position.z > 15) {
            scene.remove(o);
            orbs.splice(i, 1);
        }
    }

    // Stars rotation
    stars.rotation.z += 0.0001;

    // Update HUD
    document.getElementById('hud-score').textContent = score + ' pts';
    document.getElementById('hud-speed').textContent = gameSpeed.toFixed(1) + 'x';
    document.getElementById('shield-fill').style.width = shield + '%';
    if (shield < 30) {
        document.getElementById('shield-fill').style.background = 'linear-gradient(90deg, #ff4444, #ff8800)';
    } else {
        document.getElementById('shield-fill').style.background = 'linear-gradient(90deg, #00ff88, #00ccff)';
    }

    // Point light follows ship
    pointLight.position.set(playerX, playerY + 2, 8);

    renderer.render(scene, camera);
}

function endGame() {
    playing = false;
    let newRecord = false;
    if (score > best) {
        best = score;
        localStorage.setItem('space_drift_best', best);
        newRecord = true;
    }
    document.getElementById('go-score').textContent = `Pontuação: ${score} pts | Recorde: ${best} pts`;
    document.getElementById('go-record').style.display = newRecord ? 'block' : 'none';
    document.getElementById('gameover').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('shield-bar').style.display = 'none';
    document.getElementById('shield-label').style.display = 'none';
}

document.getElementById('start-btn').onclick = startGame;
document.getElementById('go-btn').onclick = startGame;

// Ambient render when in menu
function menuRender() {
    if (playing) return;
    requestAnimationFrame(menuRender);
    stars.rotation.z += 0.0002;
    stars.rotation.x += 0.0001;
    renderer.render(scene, camera);
}
menuRender();

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
    </script>
</body>
</html>
