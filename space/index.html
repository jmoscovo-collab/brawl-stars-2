<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="Street Drive 3D — dirija em alta velocidade, desvie do tráfego e bata seu recorde! Jogo grátis da Cogumelo Games!">
    <meta property="og:title" content="Street Drive 3D — Cogumelo Games">
    <meta property="og:description" content="Dirija em alta velocidade numa estrada infinita! Desvie dos carros e sobreviva!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cogumelogames.com.br/space/">
    <link rel="canonical" href="https://cogumelogames.com.br/space/">
    <title>Street Drive 3D — Cogumelo Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #menu { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100; }
        #menu h1 { font-size: 52px; font-weight: 900; background: linear-gradient(to right, #ff4444, #ff8800, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }
        #menu .subtitle { color: #666; font-size: 13px; letter-spacing: 4px; }
        #menu .best { color: #ffcc00; font-size: 16px; margin-top: 10px; }
        .car-select { display: flex; gap: 15px; margin: 15px 0; }
        .car-option { background: rgba(20,20,50,0.9); border: 3px solid #333; border-radius: 12px; padding: 15px 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .car-option:hover { border-color: #ff8800; transform: scale(1.05); }
        .car-option.selected { border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.4); }
        .car-option .car-emoji { font-size: 36px; }
        .car-option .car-label { color: #fff; font-size: 12px; margin-top: 5px; }
        #start-btn { padding: 16px 60px; font-size: 22px; font-weight: bold; background: linear-gradient(135deg, #ff4444, #ff8800); color: #fff; border: none; border-radius: 30px; cursor: pointer; letter-spacing: 2px; }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 5px 30px rgba(255,68,68,0.4); }
        .controls-hint { color: #444; font-size: 12px; margin-top: 10px; }
        #hud { position: fixed; top: 15px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 50; }
        #hud span { color: #fff; font-size: 16px; font-weight: bold; font-family: monospace; text-shadow: 0 0 5px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); padding: 5px 14px; border-radius: 10px; }
        #speedometer { position: fixed; bottom: 20px; right: 20px; color: #fff; font-size: 28px; font-weight: bold; font-family: monospace; text-shadow: 0 0 10px rgba(255,68,68,0.5); z-index: 50; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 12px; border: 2px solid #ff4444; }
        #gameover { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 200; }
        #gameover h1 { font-size: 48px; color: #ff4444; text-shadow: 0 0 20px rgba(255,0,0,0.5); }
        #gameover p { color: #aaa; font-size: 18px; }
        #gameover .new-record { color: #ffcc00; font-size: 22px; font-weight: bold; }
        #gameover button { padding: 14px 50px; font-size: 18px; font-weight: bold; background: #ff4444; color: #fff; border: none; border-radius: 25px; cursor: pointer; }
        #gameover button:hover { transform: scale(1.05); }
        @media (max-width: 600px) {
            #menu h1 { font-size: 32px; }
            .car-select { gap: 8px; }
            .car-option { padding: 10px 14px; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="menu">
        <h1>STREET DRIVE</h1>
        <div class="subtitle">COGUMELO GAMES</div>
        <div class="best" id="menu-best"></div>
        <div class="car-select" id="car-select"></div>
        <button id="start-btn">ACELERAR! 🏎️</button>
        <div class="controls-hint">← → ou A/D = Trocar faixa | ↑ ou W = Acelerar | ↓ ou S = Frear</div>
    </div>
    <div id="hud" style="display:none">
        <span id="hud-score">0 m</span>
        <span id="hud-dodge">Desvios: 0</span>
    </div>
    <div id="speedometer" style="display:none">0 km/h</div>
    <div id="gameover">
        <h1>BATEU! 💥</h1>
        <p id="go-score"></p>
        <p id="go-record" class="new-record" style="display:none">NOVO RECORDE!</p>
        <button id="go-btn">TENTAR DE NOVO</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x87ceeb);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 80, 250);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(20, 40, 30);
dirLight.castShadow = true;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 200;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

// Car colors for selection
const CAR_OPTIONS = [
    { name: 'Vermelho', color: 0xff2222, emoji: '🔴' },
    { name: 'Azul', color: 0x2255ff, emoji: '🔵' },
    { name: 'Verde', color: 0x22cc44, emoji: '🟢' },
    { name: 'Amarelo', color: 0xffcc00, emoji: '🟡' },
];

let selectedCarColor = 0;
const carSelectDiv = document.getElementById('car-select');
CAR_OPTIONS.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'car-option' + (i === 0 ? ' selected' : '');
    div.innerHTML = `<div class="car-emoji">${opt.emoji}</div><div class="car-label">${opt.name}</div>`;
    div.onclick = () => {
        selectedCarColor = i;
        document.querySelectorAll('.car-option').forEach(c => c.classList.remove('selected'));
        div.classList.add('selected');
    };
    carSelectDiv.appendChild(div);
});

// Lanes
const LANES = [-4, 0, 4];
const ROAD_WIDTH = 14;

// Build road segments
const roadSegments = [];
const ROAD_SEG_LEN = 20;
const VISIBLE_SEGMENTS = 20;

function createRoadSegment(z) {
    const group = new THREE.Group();
    // Asphalt
    const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_SEG_LEN);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0.01, z);
    road.receiveShadow = true;
    group.add(road);
    // Center dashes
    const dashGeo = new THREE.PlaneGeometry(0.2, 3);
    const dashMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    for (let d = -8; d <= 8; d += 5) {
        const dash = new THREE.Mesh(dashGeo, dashMat);
        dash.rotation.x = -Math.PI / 2;
        dash.position.set(-4, 0.02, z + d);
        group.add(dash);
        const dash2 = dash.clone();
        dash2.position.set(4, 0.02, z + d);
        group.add(dash2);
    }
    // Side lines
    const sideGeo = new THREE.PlaneGeometry(0.3, ROAD_SEG_LEN);
    const sideMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
    const sideL = new THREE.Mesh(sideGeo, sideMat);
    sideL.rotation.x = -Math.PI / 2;
    sideL.position.set(-ROAD_WIDTH / 2, 0.02, z);
    group.add(sideL);
    const sideR = sideL.clone();
    sideR.position.set(ROAD_WIDTH / 2, 0.02, z);
    group.add(sideR);
    // Grass sides
    const grassGeo = new THREE.PlaneGeometry(60, ROAD_SEG_LEN);
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x4a9e3f, roughness: 0.9 });
    const grassL = new THREE.Mesh(grassGeo, grassMat);
    grassL.rotation.x = -Math.PI / 2;
    grassL.position.set(-ROAD_WIDTH / 2 - 30, -0.01, z);
    group.add(grassL);
    const grassR = grassL.clone();
    grassR.position.set(ROAD_WIDTH / 2 + 30, -0.01, z);
    group.add(grassR);
    scene.add(group);
    return { group, z };
}

function initRoad() {
    for (let i = 0; i < VISIBLE_SEGMENTS; i++) {
        roadSegments.push(createRoadSegment(-i * ROAD_SEG_LEN));
    }
}

// Create a car mesh
function createCar(color, isPlayer) {
    const group = new THREE.Group();
    // Body lower
    const bodyGeo = new THREE.BoxGeometry(2.4, 0.8, 4.5);
    const bodyMat = new THREE.MeshStandardMaterial({ color, metalness: 0.7, roughness: 0.25 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.7;
    body.castShadow = true;
    group.add(body);
    // Body upper (cabin)
    const cabinGeo = new THREE.BoxGeometry(2, 0.7, 2.2);
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
    const cabin = new THREE.Mesh(cabinGeo, cabinMat);
    cabin.position.set(0, 1.3, -0.2);
    cabin.castShadow = true;
    group.add(cabin);
    // Windshield
    const windGeo = new THREE.PlaneGeometry(1.8, 0.6);
    const windMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, metalness: 0.9, roughness: 0.05, transparent: true, opacity: 0.7 });
    const windF = new THREE.Mesh(windGeo, windMat);
    windF.position.set(0, 1.35, -1.3);
    windF.rotation.x = 0.2;
    group.add(windF);
    const windB = new THREE.Mesh(windGeo, windMat);
    windB.position.set(0, 1.35, 0.9);
    windB.rotation.x = -0.2;
    group.add(windB);
    // Headlights
    const hlGeo = new THREE.SphereGeometry(0.15, 8, 6);
    const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
    const hlL = new THREE.Mesh(hlGeo, hlMat);
    hlL.position.set(-0.8, 0.7, -2.3);
    group.add(hlL);
    const hlR = hlL.clone();
    hlR.position.set(0.8, 0.7, -2.3);
    group.add(hlR);
    // Tail lights
    const tlMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const tlL = new THREE.Mesh(hlGeo, tlMat);
    tlL.position.set(-0.8, 0.7, 2.3);
    group.add(tlL);
    const tlR = tlL.clone();
    tlR.position.set(0.8, 0.7, 2.3);
    group.add(tlR);
    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 12);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6 });
    const wheelPositions = [[-1.2, 0.4, 1.5], [1.2, 0.4, 1.5], [-1.2, 0.4, -1.5], [1.2, 0.4, -1.5]];
    for (const [wx, wy, wz] of wheelPositions) {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(wx, wy, wz);
        wheel.castShadow = true;
        group.add(wheel);
        // Rim
        const rimGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.32, 8);
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9 });
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.rotation.z = Math.PI / 2;
        rim.position.set(wx, wy, wz);
        group.add(rim);
    }
    if (isPlayer) {
        // Spoiler
        const spoilerGeo = new THREE.BoxGeometry(2.2, 0.08, 0.4);
        const spoilerMat = new THREE.MeshStandardMaterial({ color, metalness: 0.6 });
        const spoiler = new THREE.Mesh(spoilerGeo, spoilerMat);
        spoiler.position.set(0, 1.5, 2.1);
        group.add(spoiler);
        const legGeo = new THREE.BoxGeometry(0.1, 0.4, 0.1);
        const legL = new THREE.Mesh(legGeo, spoilerMat);
        legL.position.set(-0.9, 1.3, 2.1);
        group.add(legL);
        const legR = legL.clone();
        legR.position.set(0.9, 1.3, 2.1);
        group.add(legR);
    }
    return group;
}

// Traffic car colors
const TRAFFIC_COLORS = [0x888888, 0x2244aa, 0xaa2222, 0x22aa44, 0xffffff, 0x444444, 0xffaa00, 0x8822aa];

// Game state
let playerCar, trafficCars = [], playing = false;
let playerLane = 1, targetLane = 1, playerX = 0;
let speed = 0, maxSpeed = 2.5, distance = 0, dodges = 0;
let spawnTimer = 0, trafficSpeed = 0.8;
let keys = {};
let best = parseInt(localStorage.getItem('street_drive_best') || '0');

if (best > 0) document.getElementById('menu-best').textContent = `Recorde: ${best} m`;

document.addEventListener('keydown', e => {
    if (!playing) return;
    keys[e.code] = true;
    if (e.code === 'KeyA' || e.code === 'ArrowLeft') { targetLane = Math.max(0, targetLane - 1); }
    if (e.code === 'KeyD' || e.code === 'ArrowRight') { targetLane = Math.min(2, targetLane + 1); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch
let touchStartX = 0;
canvas.addEventListener('touchstart', e => { e.preventDefault(); touchStartX = e.touches[0].clientX; });
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (!playing) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx > 40) targetLane = Math.min(2, targetLane + 1);
    else if (dx < -40) targetLane = Math.max(0, targetLane - 1);
});

// Ground
const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a9e3f, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

initRoad();

function startGame() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameover').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('speedometer').style.display = 'block';

    if (playerCar) scene.remove(playerCar);
    trafficCars.forEach(t => scene.remove(t.mesh));
    trafficCars = [];

    playerCar = createCar(CAR_OPTIONS[selectedCarColor].color, true);
    playerCar.position.set(0, 0, 0);
    scene.add(playerCar);

    playerLane = 1; targetLane = 1; playerX = 0;
    speed = 0; maxSpeed = 2.5; distance = 0; dodges = 0;
    spawnTimer = 0; trafficSpeed = 0.8;
    keys = {};
    playing = true;
    gameLoop();
}

function gameLoop() {
    if (!playing) return;
    requestAnimationFrame(gameLoop);

    // Acceleration
    if (keys['KeyW'] || keys['ArrowUp']) {
        speed = Math.min(speed + 0.02, maxSpeed);
    } else if (keys['KeyS'] || keys['ArrowDown']) {
        speed = Math.max(speed - 0.04, 0.5);
    } else {
        if (speed < 1.2) speed += 0.005;
    }

    // Gradually increase max speed
    maxSpeed = 2.5 + distance * 0.001;
    if (maxSpeed > 5) maxSpeed = 5;

    // Lane switching
    const laneX = LANES[targetLane];
    playerX += (laneX - playerX) * 0.1;
    playerCar.position.x = playerX;
    playerCar.rotation.y = (laneX - playerX) * 0.08;

    // Distance
    distance += speed * 0.5;

    // Move road
    for (const seg of roadSegments) {
        seg.group.position.z += speed;
        if (seg.group.position.z > ROAD_SEG_LEN * 2) {
            seg.group.position.z -= VISIBLE_SEGMENTS * ROAD_SEG_LEN;
        }
    }

    // Spawn traffic
    spawnTimer++;
    const spawnRate = Math.max(20, 50 - distance * 0.02);
    if (spawnTimer >= spawnRate) {
        spawnTimer = 0;
        const lane = Math.floor(Math.random() * 3);
        const color = TRAFFIC_COLORS[Math.floor(Math.random() * TRAFFIC_COLORS.length)];
        const mesh = createCar(color, false);
        mesh.position.set(LANES[lane], 0, -140 - Math.random() * 40);
        scene.add(mesh);
        trafficCars.push({ mesh, lane, passed: false, speed: 0.3 + Math.random() * 0.4 });
    }

    // Move traffic
    for (let i = trafficCars.length - 1; i >= 0; i--) {
        const t = trafficCars[i];
        t.mesh.position.z += speed - t.speed;

        // Collision
        const dx = Math.abs(t.mesh.position.x - playerX);
        const dz = t.mesh.position.z;
        if (dx < 2.2 && dz > -5 && dz < 4) {
            endGame();
            return;
        }

        // Passed
        if (!t.passed && t.mesh.position.z > 5) {
            t.passed = true;
            dodges++;
        }

        // Remove far
        if (t.mesh.position.z > 30) {
            scene.remove(t.mesh);
            trafficCars.splice(i, 1);
        }
    }

    // Camera follow
    const camTarget = new THREE.Vector3(playerX * 0.3, 4.5, 10);
    camera.position.lerp(camTarget, 0.05);
    camera.lookAt(playerX * 0.5, 1, -15);

    // HUD
    const dist = Math.floor(distance);
    document.getElementById('hud-score').textContent = dist + ' m';
    document.getElementById('hud-dodge').textContent = 'Desvios: ' + dodges;
    const kmh = Math.floor(speed * 80);
    document.getElementById('speedometer').textContent = kmh + ' km/h';

    renderer.render(scene, camera);
}

function endGame() {
    playing = false;
    const dist = Math.floor(distance);
    let newRecord = false;
    if (dist > best) {
        best = dist;
        localStorage.setItem('street_drive_best', best);
        newRecord = true;
    }
    document.getElementById('go-score').textContent = `Distância: ${dist} m | Desvios: ${dodges} | Recorde: ${best} m`;
    document.getElementById('go-record').style.display = newRecord ? 'block' : 'none';
    document.getElementById('gameover').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('speedometer').style.display = 'none';
}

document.getElementById('start-btn').onclick = startGame;
document.getElementById('go-btn').onclick = startGame;

// Menu ambient
function menuRender() {
    if (playing) return;
    requestAnimationFrame(menuRender);
    camera.position.set(0, 6, 12);
    camera.lookAt(0, 0, -20);
    renderer.render(scene, camera);
}
menuRender();

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
    </script>
</body>
</html>
