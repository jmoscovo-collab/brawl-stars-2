<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="Street Drive 3D — dirija em alta velocidade, desvie do tráfego e bata seu recorde! Jogo grátis da Cogumelo Games!">
    <meta property="og:title" content="Street Drive 3D — Cogumelo Games">
    <meta property="og:description" content="Dirija em alta velocidade numa estrada infinita! Desvie dos carros e sobreviva!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cogumelogames.com.br/space/">
    <link rel="canonical" href="https://cogumelogames.com.br/space/">
    <title>Street Drive 3D — Cogumelo Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #menu { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100; }
        #menu h1 { font-size: 52px; font-weight: 900; background: linear-gradient(to right, #ff4444, #ff8800, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }
        #menu .subtitle { color: #666; font-size: 13px; letter-spacing: 4px; }
        #menu .best { color: #ffcc00; font-size: 16px; margin-top: 10px; }
        .car-select { display: flex; gap: 15px; margin: 15px 0; }
        .car-option { background: rgba(20,20,50,0.9); border: 3px solid #333; border-radius: 12px; padding: 15px 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .car-option:hover { border-color: #ff8800; transform: scale(1.05); }
        .car-option.selected { border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.4); }
        .car-option .car-emoji { font-size: 36px; }
        .car-option .car-label { color: #fff; font-size: 12px; margin-top: 5px; }
        #start-btn { padding: 16px 60px; font-size: 22px; font-weight: bold; background: linear-gradient(135deg, #ff4444, #ff8800); color: #fff; border: none; border-radius: 30px; cursor: pointer; letter-spacing: 2px; }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 5px 30px rgba(255,68,68,0.4); }
        .controls-hint { color: #444; font-size: 12px; margin-top: 10px; }
        #hud { position: fixed; top: 15px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 50; }
        #hud span { color: #fff; font-size: 16px; font-weight: bold; font-family: monospace; text-shadow: 0 0 5px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); padding: 5px 14px; border-radius: 10px; }
        #speedometer { position: fixed; bottom: 20px; right: 20px; color: #fff; font-size: 32px; font-weight: bold; font-family: monospace; text-shadow: 0 0 10px rgba(255,68,68,0.5); z-index: 50; background: rgba(0,0,0,0.7); padding: 10px 18px; border-radius: 12px; border: 2px solid #ff4444; }
        #gameover { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 200; }
        #gameover h1 { font-size: 48px; color: #ff4444; text-shadow: 0 0 20px rgba(255,0,0,0.5); }
        #gameover p { color: #aaa; font-size: 18px; }
        #gameover .new-record { color: #ffcc00; font-size: 22px; font-weight: bold; }
        #gameover button { padding: 14px 50px; font-size: 18px; font-weight: bold; background: #ff4444; color: #fff; border: none; border-radius: 25px; cursor: pointer; }
        #gameover button:hover { transform: scale(1.05); }
        #speed-lines { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 40; opacity: 0; transition: opacity 0.3s; }
        @media (max-width: 600px) {
            #menu h1 { font-size: 32px; }
            .car-select { gap: 8px; }
            .car-option { padding: 10px 14px; }
            #speedometer { font-size: 24px; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="speed-lines"></div>
    <div id="menu">
        <h1>STREET DRIVE</h1>
        <div class="subtitle">COGUMELO GAMES</div>
        <div class="best" id="menu-best"></div>
        <div class="car-select" id="car-select"></div>
        <button id="start-btn">ACELERAR! 🏎️</button>
        <div class="controls-hint">W = Acelerar | S = Frear | A/D = Virar | Livre — sem game over!</div>
    </div>
    <div id="hud" style="display:none">
        <span id="hud-score">0 m</span>
        <span id="hud-dodge"></span>
    </div>
    <div id="speedometer" style="display:none">0 km/h</div>
    <div id="gameover" style="display:none"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x6baed6);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x9dc8e8, 0.006);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);

// Realistic lighting
const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x3a7a3a, 0.6);
scene.add(hemiLight);
const sunLight = new THREE.DirectionalLight(0xfff4e0, 1.2);
sunLight.position.set(-30, 50, -20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 200;
sunLight.shadow.camera.left = -60;
sunLight.shadow.camera.right = 60;
sunLight.shadow.camera.top = 60;
sunLight.shadow.camera.bottom = -60;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

// Car options
const CAR_OPTIONS = [
    { name: 'Vermelho', color: 0xcc1111, emoji: '🔴' },
    { name: 'Azul', color: 0x1144cc, emoji: '🔵' },
    { name: 'Preto', color: 0x111111, emoji: '⚫' },
    { name: 'Branco', color: 0xeeeeee, emoji: '⚪' },
];

let selectedCarColor = 0;
const carSelectDiv = document.getElementById('car-select');
CAR_OPTIONS.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'car-option' + (i === 0 ? ' selected' : '');
    div.innerHTML = `<div class="car-emoji">${opt.emoji}</div><div class="car-label">${opt.name}</div>`;
    div.onclick = () => {
        selectedCarColor = i;
        document.querySelectorAll('.car-option').forEach(c => c.classList.remove('selected'));
        div.classList.add('selected');
    };
    carSelectDiv.appendChild(div);
});

// Lanes
const LANES = [-3.8, 0, 3.8];
const ROAD_WIDTH = 13;

// Road segments
const roadSegments = [];
const ROAD_SEG_LEN = 24;
const VISIBLE_SEGMENTS = 18;

// Trees pool
const trees = [];

function createTree() {
    const group = new THREE.Group();
    const trunkH = 1.5 + Math.random() * 1;
    const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, trunkH, 6);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3d1e, roughness: 0.9 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = trunkH / 2;
    trunk.castShadow = true;
    group.add(trunk);
    const leavesH = 2.5 + Math.random() * 1.5;
    const leavesGeo = new THREE.ConeGeometry(1.2 + Math.random() * 0.8, leavesH, 7);
    const green = 0x2d6b2d + Math.floor(Math.random() * 0x1a2a1a);
    const leavesMat = new THREE.MeshStandardMaterial({ color: green, roughness: 0.8, flatShading: true });
    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
    leaves.position.y = trunkH + leavesH / 2 - 0.3;
    leaves.castShadow = true;
    group.add(leaves);
    return group;
}

function createRoadSegment(z) {
    const group = new THREE.Group();
    // Asphalt with texture-like appearance
    const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_SEG_LEN);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.85, metalness: 0.05 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0.01, z);
    road.receiveShadow = true;
    group.add(road);

    // Lane dashes (white)
    const dashGeo = new THREE.PlaneGeometry(0.15, 2.5);
    const dashMat = new THREE.MeshBasicMaterial({ color: 0xdddddd });
    for (let d = -10; d <= 10; d += 6) {
        for (const lx of [-3.8, 3.8]) {
            const dash = new THREE.Mesh(dashGeo, dashMat);
            dash.rotation.x = -Math.PI / 2;
            dash.position.set(lx, 0.02, z + d);
            group.add(dash);
        }
    }

    // Yellow side lines (continuous)
    const sideGeo = new THREE.PlaneGeometry(0.2, ROAD_SEG_LEN);
    const sideMat = new THREE.MeshBasicMaterial({ color: 0xddaa00 });
    const sideL = new THREE.Mesh(sideGeo, sideMat);
    sideL.rotation.x = -Math.PI / 2;
    sideL.position.set(-ROAD_WIDTH / 2 + 0.2, 0.02, z);
    group.add(sideL);
    const sideR = sideL.clone();
    sideR.position.set(ROAD_WIDTH / 2 - 0.2, 0.02, z);
    group.add(sideR);

    // Sidewalk / curb
    const curbGeo = new THREE.BoxGeometry(0.5, 0.15, ROAD_SEG_LEN);
    const curbMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.7 });
    const curbL = new THREE.Mesh(curbGeo, curbMat);
    curbL.position.set(-ROAD_WIDTH / 2 - 0.25, 0.075, z);
    curbL.castShadow = true;
    group.add(curbL);
    const curbR = curbL.clone();
    curbR.position.set(ROAD_WIDTH / 2 + 0.25, 0.075, z);
    group.add(curbR);

    // Guard rail
    const railGeo = new THREE.BoxGeometry(0.1, 0.6, ROAD_SEG_LEN);
    const railMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.3 });
    const railL = new THREE.Mesh(railGeo, railMat);
    railL.position.set(-ROAD_WIDTH / 2 - 1, 0.4, z);
    railL.castShadow = true;
    group.add(railL);
    const railR = railL.clone();
    railR.position.set(ROAD_WIDTH / 2 + 1, 0.4, z);
    group.add(railR);

    // Rail posts
    const postGeo = new THREE.BoxGeometry(0.08, 0.7, 0.08);
    const postMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.6 });
    for (let p = -10; p <= 10; p += 5) {
        for (const side of [-1, 1]) {
            const post = new THREE.Mesh(postGeo, postMat);
            post.position.set(side * (ROAD_WIDTH / 2 + 1), 0.35, z + p);
            group.add(post);
        }
    }

    // Trees on sides
    for (let t = 0; t < 3; t++) {
        const tree = createTree();
        const side = Math.random() > 0.5 ? 1 : -1;
        tree.position.set(side * (ROAD_WIDTH / 2 + 3 + Math.random() * 8), 0, z + (Math.random() - 0.5) * ROAD_SEG_LEN);
        group.add(tree);
        trees.push(tree);
    }

    scene.add(group);
    return { group, z };
}

function initRoad() {
    for (let i = 0; i < VISIBLE_SEGMENTS; i++) {
        roadSegments.push(createRoadSegment(-i * ROAD_SEG_LEN));
    }
}

// Realistic car
function createCar(color, isPlayer) {
    const group = new THREE.Group();

    // Body lower — more sculpted
    const bodyGeo = new THREE.BoxGeometry(2.2, 0.7, 4.8);
    const bodyMat = new THREE.MeshStandardMaterial({ color, metalness: 0.85, roughness: 0.15 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.65;
    body.castShadow = true;
    body.receiveShadow = true;
    group.add(body);

    // Fender curves (rounded sides)
    const fenderGeo = new THREE.CylinderGeometry(0.35, 0.35, 4.8, 8, 1, false, 0, Math.PI);
    const fenderL = new THREE.Mesh(fenderGeo, bodyMat);
    fenderL.rotation.x = Math.PI / 2;
    fenderL.rotation.z = Math.PI / 2;
    fenderL.position.set(-1.1, 0.65, 0);
    group.add(fenderL);
    const fenderR = fenderL.clone();
    fenderR.position.set(1.1, 0.65, 0);
    fenderR.rotation.z = -Math.PI / 2;
    group.add(fenderR);

    // Cabin (glass look)
    const cabinGeo = new THREE.BoxGeometry(1.9, 0.65, 2.4);
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.95, roughness: 0.05 });
    const cabin = new THREE.Mesh(cabinGeo, cabinMat);
    cabin.position.set(0, 1.25, -0.1);
    cabin.castShadow = true;
    group.add(cabin);

    // Windshield (reflective)
    const windGeo = new THREE.PlaneGeometry(1.7, 0.55);
    const windMat = new THREE.MeshStandardMaterial({ color: 0x4488bb, metalness: 0.95, roughness: 0.02, transparent: true, opacity: 0.6 });
    const windF = new THREE.Mesh(windGeo, windMat);
    windF.position.set(0, 1.3, -1.35);
    windF.rotation.x = 0.25;
    group.add(windF);
    const windB = new THREE.Mesh(windGeo, windMat);
    windB.position.set(0, 1.3, 1.05);
    windB.rotation.x = -0.25;
    group.add(windB);

    // Side windows
    const sideWinGeo = new THREE.PlaneGeometry(2, 0.5);
    const sideWinL = new THREE.Mesh(sideWinGeo, windMat);
    sideWinL.position.set(-1.0, 1.25, -0.1);
    sideWinL.rotation.y = Math.PI / 2;
    group.add(sideWinL);
    const sideWinR = sideWinL.clone();
    sideWinR.position.set(1.0, 1.25, -0.1);
    group.add(sideWinR);

    // Headlights (LED style)
    const hlGeo = new THREE.BoxGeometry(0.5, 0.15, 0.08);
    const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const hlL = new THREE.Mesh(hlGeo, hlMat);
    hlL.position.set(-0.7, 0.7, -2.42);
    group.add(hlL);
    const hlR = hlL.clone();
    hlR.position.set(0.7, 0.7, -2.42);
    group.add(hlR);

    // Tail lights (strip)
    const tlGeo = new THREE.BoxGeometry(0.6, 0.1, 0.06);
    const tlMat = new THREE.MeshBasicMaterial({ color: 0xcc0000 });
    const tlL = new THREE.Mesh(tlGeo, tlMat);
    tlL.position.set(-0.65, 0.7, 2.42);
    group.add(tlL);
    const tlR = tlL.clone();
    tlR.position.set(0.65, 0.7, 2.42);
    group.add(tlR);

    // Wheels with tire detail
    const wheelGeo = new THREE.TorusGeometry(0.35, 0.15, 8, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 });
    const rimGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.28, 5);
    const rimMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.95, roughness: 0.1 });
    const wheelPositions = [[-1.15, 0.35, 1.6], [1.15, 0.35, 1.6], [-1.15, 0.35, -1.6], [1.15, 0.35, -1.6]];
    for (const [wx, wy, wz] of wheelPositions) {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.y = Math.PI / 2;
        wheel.position.set(wx, wy, wz);
        wheel.castShadow = true;
        group.add(wheel);
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.rotation.z = Math.PI / 2;
        rim.position.set(wx, wy, wz);
        group.add(rim);
    }

    // Bumpers
    const bumperGeo = new THREE.BoxGeometry(2.3, 0.2, 0.2);
    const bumperMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.3 });
    const bumperF = new THREE.Mesh(bumperGeo, bumperMat);
    bumperF.position.set(0, 0.4, -2.45);
    group.add(bumperF);
    const bumperB = bumperF.clone();
    bumperB.position.set(0, 0.4, 2.45);
    group.add(bumperB);

    if (isPlayer) {
        // Spoiler
        const spoilerGeo = new THREE.BoxGeometry(2.0, 0.06, 0.35);
        const spoilerMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.7, roughness: 0.2 });
        const spoiler = new THREE.Mesh(spoilerGeo, spoilerMat);
        spoiler.position.set(0, 1.55, 2.0);
        group.add(spoiler);
        const legGeo = new THREE.BoxGeometry(0.06, 0.35, 0.06);
        const legL = new THREE.Mesh(legGeo, spoilerMat);
        legL.position.set(-0.8, 1.38, 2.0);
        group.add(legL);
        const legR = legL.clone();
        legR.position.set(0.8, 1.38, 2.0);
        group.add(legR);

        // Exhaust pipes
        const exGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.3, 8);
        const exMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.9 });
        const exL = new THREE.Mesh(exGeo, exMat);
        exL.rotation.x = Math.PI / 2;
        exL.position.set(-0.5, 0.25, 2.55);
        group.add(exL);
        const exR = exL.clone();
        exR.position.set(0.5, 0.25, 2.55);
        group.add(exR);
    }

    // Shadow under car
    const shadowGeo = new THREE.PlaneGeometry(2.8, 5.2);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
    const shadow = new THREE.Mesh(shadowGeo, shadowMat);
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.y = 0.02;
    group.add(shadow);

    return group;
}

// Traffic colors (realistic)
const TRAFFIC_COLORS = [0x333333, 0x1a1a88, 0x881a1a, 0x1a6622, 0xeeeeee, 0x555555, 0xcc8800, 0x666666, 0x2266aa, 0xaa2244];

// Game state
let playerCar, trafficCars = [], playing = false;
let playerX = 0, playerAngle = 0, steerAngle = 0;
let speed = 0, maxSpeed = 4.0, distance = 0;
let spawnTimer = 0;
let keys = {};
let best = parseInt(localStorage.getItem('street_drive_best') || '0');
let cameraShake = 0;

if (best > 0) document.getElementById('menu-best').textContent = `Recorde: ${best} m`;

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch steering
let touchActive = false, touchX = 0;
canvas.addEventListener('touchstart', e => { e.preventDefault(); touchActive = true; touchX = e.touches[0].clientX; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (touchActive) touchX = e.touches[0].clientX; });
canvas.addEventListener('touchend', e => { e.preventDefault(); touchActive = false; });

// Ground
const groundGeo = new THREE.PlaneGeometry(600, 600);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x3d8c3d, roughness: 0.95 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

initRoad();

function startGame() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameover').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('speedometer').style.display = 'block';

    if (playerCar) scene.remove(playerCar);
    trafficCars.forEach(t => scene.remove(t.mesh));
    trafficCars = [];

    playerCar = createCar(CAR_OPTIONS[selectedCarColor].color, true);
    playerCar.position.set(0, 0, 0);
    scene.add(playerCar);

    playerX = 0; playerAngle = 0; steerAngle = 0;
    speed = 0; maxSpeed = 4.0; distance = 0;
    spawnTimer = 0; cameraShake = 0;
    keys = {};
    playing = true;
    gameLoop();
}

function gameLoop() {
    if (!playing) return;
    requestAnimationFrame(gameLoop);

    // Acceleration / braking
    if (keys['KeyW'] || keys['ArrowUp']) {
        speed = Math.min(speed + 0.018, maxSpeed);
    } else if (keys['KeyS'] || keys['ArrowDown']) {
        speed = Math.max(speed - 0.035, -1);
    } else {
        speed *= 0.995;
        if (Math.abs(speed) < 0.01) speed = 0;
    }

    // Steering
    const turnPower = 0.03 * (speed / maxSpeed);
    if (keys['KeyA'] || keys['ArrowLeft']) steerAngle = Math.min(steerAngle + 0.04, 1);
    else if (keys['KeyD'] || keys['ArrowRight']) steerAngle = Math.max(steerAngle - 0.04, -1);
    else steerAngle *= 0.9;

    // Touch steering
    if (touchActive) {
        const center = window.innerWidth / 2;
        const touchSteer = (touchX - center) / (center * 0.6);
        steerAngle = -Math.max(-1, Math.min(1, touchSteer));
        if (speed < 0.5) speed = Math.min(speed + 0.01, maxSpeed);
    }

    // Apply steering to position
    playerAngle += steerAngle * turnPower;
    playerX += -steerAngle * speed * 0.12;
    playerX = Math.max(-25, Math.min(25, playerX));

    // Car rotation
    playerCar.position.x = playerX;
    playerCar.rotation.y = steerAngle * 0.3;
    playerCar.rotation.z = -steerAngle * 0.04;

    distance += Math.abs(speed) * 0.5;

    // Move road
    for (const seg of roadSegments) {
        seg.group.position.z += speed;
        if (seg.group.position.z > ROAD_SEG_LEN * 2) {
            seg.group.position.z -= VISIBLE_SEGMENTS * ROAD_SEG_LEN;
        }
    }

    // Spawn traffic (passive — just cars on the road, no collision)
    spawnTimer++;
    if (spawnTimer >= 60) {
        spawnTimer = 0;
        const lane = Math.floor(Math.random() * 3);
        const color = TRAFFIC_COLORS[Math.floor(Math.random() * TRAFFIC_COLORS.length)];
        const mesh = createCar(color, false);
        mesh.position.set(LANES[lane], 0, -150 - Math.random() * 40);
        scene.add(mesh);
        trafficCars.push({ mesh, lane, speed: 0.3 + Math.random() * 0.4 });
    }

    // Move traffic (no collision — just visual)
    for (let i = trafficCars.length - 1; i >= 0; i--) {
        const t = trafficCars[i];
        t.mesh.position.z += speed - t.speed;
        if (t.mesh.position.z > 40) {
            scene.remove(t.mesh);
            trafficCars.splice(i, 1);
        }
    }

    // Camera — smooth follow behind car
    const camHeight = 4.5 + Math.abs(speed) * 0.4;
    const camDist = 10 + Math.abs(speed) * 0.6;
    const camTarget = new THREE.Vector3(playerX * 0.4, camHeight, camDist);
    camera.position.lerp(camTarget, 0.05);
    camera.lookAt(playerX * 0.5, 1, -20);

    // FOV increases with speed
    camera.fov = 55 + Math.abs(speed) * 5;
    camera.updateProjectionMatrix();

    // Speed lines
    const speedRatio = Math.abs(speed) / maxSpeed;
    document.getElementById('speed-lines').style.opacity = speedRatio > 0.6 ? (speedRatio - 0.6) * 2.5 : 0;

    // Sun follows
    sunLight.position.set(playerX - 30, 50, -20);
    sunLight.target.position.set(playerX, 0, -10);

    // HUD
    document.getElementById('hud-score').textContent = Math.floor(distance) + ' m';
    document.getElementById('hud-dodge').textContent = '';
    document.getElementById('speedometer').textContent = Math.floor(Math.abs(speed) * 80) + ' km/h';

    renderer.render(scene, camera);
}

document.getElementById('start-btn').onclick = startGame;

// Menu ambient render
function menuRender() {
    if (playing) return;
    requestAnimationFrame(menuRender);
    camera.position.set(3, 5, 14);
    camera.lookAt(0, 0, -15);
    renderer.render(scene, camera);
}
menuRender();

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
    </script>
</body>
</html>
