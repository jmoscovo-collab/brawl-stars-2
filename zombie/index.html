<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Survival 3D — Cogumelo Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 20px 30px; pointer-events: none; z-index: 100;
        }
        #wave-display {
            font-family: 'Impact', sans-serif; font-size: 48px;
            color: #ff3333; text-shadow: 0 0 20px rgba(255,0,0,0.5), 2px 2px 4px #000;
            letter-spacing: 3px;
        }
        #wave-sub {
            font-family: Arial, sans-serif; font-size: 14px;
            color: #aaa; margin-top: 4px;
        }
        #stats-hud {
            text-align: right; font-family: Arial, sans-serif;
        }
        #stats-hud div {
            color: #fff; font-size: 14px; margin-bottom: 4px;
            text-shadow: 1px 1px 3px #000;
        }
        #stats-hud .value { color: #00ff88; font-weight: bold; font-size: 18px; }
        #health-bar-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 20px; background: rgba(0,0,0,0.7);
            border: 2px solid #333; border-radius: 10px; overflow: hidden; z-index: 100;
        }
        #health-bar {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s;
        }
        #health-text {
            position: fixed; bottom: 55px; left: 50%; transform: translateX(-50%);
            font-family: Arial, sans-serif; font-size: 12px; color: #ccc; z-index: 100;
        }
        #weapon-display {
            position: fixed; bottom: 30px; right: 30px;
            font-family: Arial, sans-serif; color: #ffaa00;
            font-size: 16px; font-weight: bold; z-index: 100;
            text-shadow: 1px 1px 3px #000;
        }
        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; z-index: 100; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.8);
        }
        #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
        #wave-announce {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Impact', sans-serif; font-size: 80px;
            color: #ff0000; text-shadow: 0 0 40px rgba(255,0,0,0.8), 3px 3px 6px #000;
            z-index: 200; opacity: 0; transition: opacity 0.5s;
            pointer-events: none;
        }
        #wave-announce.show { opacity: 1; }
        #game-over {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 300;
        }
        #game-over h1 {
            font-family: 'Impact', sans-serif; font-size: 72px;
            color: #ff0000; margin-bottom: 20px;
        }
        #game-over p { color: #aaa; font-size: 18px; margin-bottom: 10px; }
        #game-over button {
            margin-top: 30px; padding: 15px 50px;
            background: linear-gradient(135deg, #ff3333, #cc0000);
            color: #fff; border: none; border-radius: 30px;
            font-size: 20px; font-weight: bold; cursor: pointer;
        }
        #game-over button:hover { transform: scale(1.05); }
        #start-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 300;
        }
        #start-screen h1 {
            font-family: 'Impact', sans-serif; font-size: 56px;
            color: #ff3333; text-shadow: 0 0 30px rgba(255,0,0,0.5);
            margin-bottom: 10px;
        }
        #start-screen p { color: #888; font-size: 14px; margin-bottom: 5px; }
        #start-screen button {
            margin-top: 30px; padding: 15px 50px;
            background: linear-gradient(135deg, #ff3333, #cc0000);
            color: #fff; border: none; border-radius: 30px;
            font-size: 22px; font-weight: bold; cursor: pointer;
        }
        #controls-info {
            margin-top: 20px; color: #666; font-size: 12px;
            text-align: center; line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>🧟 ZOMBIE SURVIVAL</h1>
        <p>Sobreviva às ondas de zumbis na cidade abandonada</p>
        <button onclick="startGame()">▶ JOGAR</button>
        <div id="controls-info">
            WASD — mover &nbsp;|&nbsp; Mouse — olhar<br>
            Clique — atacar &nbsp;|&nbsp; Shift — correr
        </div>
    </div>

    <div id="hud">
        <div>
            <div id="wave-display">ONDA 1</div>
            <div id="wave-sub">Zumbis restantes: 5</div>
        </div>
        <div id="stats-hud">
            <div>Kills: <span class="value" id="kills-count">0</span></div>
            <div>Score: <span class="value" id="score-count">0</span></div>
        </div>
    </div>

    <div id="health-text">❤️ VIDA</div>
    <div id="health-bar-container"><div id="health-bar"></div></div>
    <div id="weapon-display">🪓 Machado Antigo</div>
    <div id="crosshair"></div>
    <div id="wave-announce"></div>

    <div id="game-over">
        <h1>VOCÊ MORREU</h1>
        <p id="go-wave">Chegou até a Onda 1</p>
        <p id="go-kills">Zumbis eliminados: 0</p>
        <p id="go-score">Score: 0</p>
        <button onclick="restartGame()">TENTAR DE NOVO</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    let scene, camera, renderer, clock;
    let player = { x: 0, z: 0, y: 1.7, health: 100, speed: 0.12, sprint: 0.2 };
    let zombies = [];
    let buildings = [];
    let wave = 1;
    let zombiesAlive = 0;
    let kills = 0;
    let score = 0;
    let gameRunning = false;
    let isAttacking = false;
    let attackCooldown = 0;
    let weapons = [
        { name: '🪓 Machado Antigo', damage: 25, range: 3, speed: 0.8 },
        { name: '⚔️ Machado de Guerra', damage: 40, range: 3.5, speed: 0.7 },
        { name: '🔥 Machado Flamejante', damage: 60, range: 4, speed: 0.6 },
        { name: '⚡ Machado Elétrico', damage: 85, range: 4.5, speed: 0.5 },
        { name: '💀 Machado das Almas', damage: 120, range: 5, speed: 0.4 }
    ];
    let currentWeapon = 0;
    let keys = {};
    let mouseX = 0, mouseY = 0;
    let playerAngle = 0;
    let cameraPitch = 0;
    let weaponMesh, weaponGroup;
    let damageFlash = 0;
    let zombieAnims = [];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x334455);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 1.7, 0);

        renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        createCity();
        createWeapon();
        setupControls();
    }

    function createCity() {
        // Ground - gray visible
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(120, 120),
            new THREE.MeshBasicMaterial({ color: 0x666666 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Road
        const road = new THREE.Mesh(
            new THREE.PlaneGeometry(8, 120),
            new THREE.MeshBasicMaterial({ color: 0x555555 })
        );
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.01;
        scene.add(road);

        for (let i = -55; i < 55; i += 8) {
            const line = new THREE.Mesh(
                new THREE.PlaneGeometry(0.3, 3),
                new THREE.MeshBasicMaterial({ color: 0xdddd00 })
            );
            line.rotation.x = -Math.PI / 2;
            line.position.set(0, 0.02, i);
            scene.add(line);
        }

        // Buildings - VISIBLE colors
        const buildingColors = [0x889999, 0x998888, 0x888899, 0x7a8a8a, 0x8a7a8a];
        for (let i = 0; i < 20; i++) {
            const w = 5 + Math.random() * 10;
            const h = 6 + Math.random() * 18;
            const d = 5 + Math.random() * 10;
            const building = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshBasicMaterial({ color: buildingColors[Math.floor(Math.random() * buildingColors.length)] })
            );
            let px, pz;
            do {
                px = (Math.random() - 0.5) * 100;
                pz = (Math.random() - 0.5) * 100;
            } while (Math.abs(px) < 10 && Math.abs(pz) < 10);
            building.position.set(px, h / 2, pz);
            scene.add(building);
            buildings.push({ mesh: building, x: px, z: pz, w: w / 2 + 1, d: d / 2 + 1 });
        }

        // Abandoned cars - bright colors
        for (let i = 0; i < 5; i++) {
            const carGroup = new THREE.Group();
            const carColors = [0xcc4444, 0x4488cc, 0x888888, 0xccaa44, 0x44aa66];
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1, 4),
                new THREE.MeshBasicMaterial({ color: carColors[i] })
            );
            body.position.y = 0.7;
            carGroup.add(body);
            const top = new THREE.Mesh(
                new THREE.BoxGeometry(1.6, 0.8, 2),
                new THREE.MeshBasicMaterial({ color: 0x666688 })
            );
            top.position.y = 1.5;
            carGroup.add(top);
            carGroup.position.set(
                (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 4),
                0, -25 + i * 13
            );
            carGroup.rotation.y = (Math.random() - 0.5) * 0.4;
            scene.add(carGroup);
        }

        // Barrels
        for (let i = 0; i < 6; i++) {
            const barrel = new THREE.Mesh(
                new THREE.CylinderGeometry(0.4, 0.4, 1, 8),
                new THREE.MeshBasicMaterial({ color: 0xaa6622 })
            );
            barrel.position.set((Math.random()-0.5)*40, 0.5, (Math.random()-0.5)*40);
            scene.add(barrel);
        }
    }

    function buildAxe(level) {
        const axe = new THREE.Group();

        const handleColors = [0x6B3A00, 0x5a3000, 0x442200, 0x222244, 0x220022];
        const bladeColors = [0x999999, 0xbbbbbb, 0xff5500, 0x3399ff, 0xaa00ff];
        const gripColors = [0x3a2000, 0x554400, 0xff2200, 0x2266cc, 0x660088];
        const collarColors = [0x777777, 0xaaaa66, 0xcc4400, 0x4488ff, 0x8800cc];

        // Handle
        const handle = new THREE.Mesh(
            new THREE.CylinderGeometry(0.035, 0.05, 1.4, 12),
            new THREE.MeshBasicMaterial({ color: handleColors[level] })
        );
        handle.rotation.z = Math.PI / 6;
        axe.add(handle);

        // Grip wrapping
        for (let i = 0; i < 6; i++) {
            const wrap = new THREE.Mesh(
                new THREE.TorusGeometry(0.048, 0.01, 6, 12),
                new THREE.MeshBasicMaterial({ color: gripColors[level] })
            );
            wrap.position.y = -0.45 + i * 0.11;
            wrap.position.x = wrap.position.y * Math.tan(Math.PI / 6) * -0.15;
            wrap.rotation.z = Math.PI / 6;
            axe.add(wrap);
        }

        // Pommel (bottom knob)
        const pommel = new THREE.Mesh(
            new THREE.SphereGeometry(0.05, 8, 8),
            new THREE.MeshBasicMaterial({ color: collarColors[level] })
        );
        pommel.position.set(-0.22, -0.55, 0);
        axe.add(pommel);

        // Metal collar
        const collar = new THREE.Mesh(
            new THREE.CylinderGeometry(0.065, 0.065, 0.1, 12),
            new THREE.MeshBasicMaterial({ color: collarColors[level] })
        );
        collar.position.set(0.18, 0.52, 0);
        collar.rotation.z = Math.PI / 6;
        axe.add(collar);

        // Blade - gets bigger with each level
        const scale = 1 + level * 0.15;
        const bladeShape = new THREE.Shape();
        bladeShape.moveTo(0, 0);
        bladeShape.quadraticCurveTo(0.35 * scale, 0.1, 0.3 * scale, 0.38 * scale);
        bladeShape.lineTo(0.25 * scale, 0.42 * scale);
        bladeShape.quadraticCurveTo(0.12, 0.3 * scale, 0, 0.25 * scale);
        bladeShape.quadraticCurveTo(-0.12, 0.3 * scale, -0.25 * scale, 0.42 * scale);
        bladeShape.lineTo(-0.3 * scale, 0.38 * scale);
        bladeShape.quadraticCurveTo(-0.35 * scale, 0.1, 0, 0);
        const bladeGeo = new THREE.ExtrudeGeometry(bladeShape, {
            depth: 0.03, bevelEnabled: true, bevelThickness: 0.008, bevelSize: 0.008
        });
        const blade = new THREE.Mesh(bladeGeo, new THREE.MeshBasicMaterial({ color: bladeColors[level] }));
        blade.position.set(0.08, 0.45, -0.015);
        blade.rotation.z = -Math.PI / 6;
        axe.add(blade);

        // Edge highlight
        const edge = new THREE.Mesh(
            new THREE.BoxGeometry(0.015, 0.38 * scale, 0.04),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        edge.position.set(0.08, 0.67, 0);
        edge.rotation.z = -Math.PI / 6;
        axe.add(edge);

        // Level 2+: decorations on blade
        if (level >= 2) {
            const gem = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.04, 0),
                new THREE.MeshBasicMaterial({ color: bladeColors[level] })
            );
            gem.position.set(0.18, 0.55, 0.02);
            gem.rotation.z = -Math.PI / 6;
            axe.add(gem);
        }

        // Level 3+: second gem
        if (level >= 3) {
            const gem2 = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.03, 0),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            gem2.position.set(0.12, 0.48, 0.02);
            gem2.rotation.z = -Math.PI / 6;
            axe.add(gem2);
        }

        // Level 4: skull on collar
        if (level >= 4) {
            const skull = new THREE.Mesh(
                new THREE.SphereGeometry(0.04, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xeeeecc })
            );
            skull.position.set(0.18, 0.6, 0.03);
            axe.add(skull);
            const eyeL = new THREE.Mesh(
                new THREE.SphereGeometry(0.012, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            eyeL.position.set(0.17, 0.61, 0.065);
            axe.add(eyeL);
            const eyeR = new THREE.Mesh(
                new THREE.SphereGeometry(0.012, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            eyeR.position.set(0.19, 0.61, 0.065);
            axe.add(eyeR);
        }

        return axe;
    }

    function createWeapon() {
        weaponGroup = new THREE.Group();
        const axe = buildAxe(0);
        weaponGroup.add(axe);
        weaponGroup.position.set(0.4, -0.4, -0.6);
        camera.add(weaponGroup);
        scene.add(camera);
    }

    function spawnZombie() {
        const zombie = new THREE.Group();
        const skinColor = [0x55aa55, 0x4a9944, 0x66aa44, 0x5b9b55][Math.floor(Math.random()*4)];
        const skinMat = new THREE.MeshBasicMaterial({ color: skinColor });

        // Torso - ragged shirt
        const torso = new THREE.Mesh(
            new THREE.BoxGeometry(0.65, 1.0, 0.4),
            new THREE.MeshBasicMaterial({ color: 0x665544 })
        );
        torso.position.y = 1.3;
        zombie.add(torso);

        // Torn shirt detail
        const tear = new THREE.Mesh(
            new THREE.BoxGeometry(0.2, 0.3, 0.41),
            skinMat
        );
        tear.position.set(0.15, 1.1, 0);
        zombie.add(tear);

        // Head
        const head = new THREE.Mesh(
            new THREE.SphereGeometry(0.28, 12, 12),
            skinMat
        );
        head.position.y = 2.1;
        zombie.add(head);

        // Jaw / mouth area
        const jaw = new THREE.Mesh(
            new THREE.BoxGeometry(0.2, 0.08, 0.15),
            new THREE.MeshBasicMaterial({ color: 0x331111 })
        );
        jaw.position.set(0, 1.95, 0.2);
        zombie.add(jaw);

        // Eyes (glowing red)
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), eyeMat);
        eyeL.position.set(-0.09, 2.12, 0.22);
        zombie.add(eyeL);
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), eyeMat);
        eyeR.position.set(0.09, 2.12, 0.22);
        zombie.add(eyeR);

        // Arms (upper + forearm)
        const armMat = skinMat;
        const armL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.5, 0.15), armMat);
        armL.position.set(-0.45, 1.5, 0.1);
        armL.rotation.x = -0.3;
        zombie.add(armL);
        const forearmL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.45, 0.12), armMat);
        forearmL.position.set(-0.45, 1.1, 0.3);
        forearmL.rotation.x = -0.7;
        zombie.add(forearmL);

        const armR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.5, 0.15), armMat);
        armR.position.set(0.45, 1.5, 0.1);
        armR.rotation.x = -0.3;
        zombie.add(armR);
        const forearmR = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.45, 0.12), armMat);
        forearmR.position.set(0.45, 1.1, 0.3);
        forearmR.rotation.x = -0.7;
        zombie.add(forearmR);

        // Hands
        const handMat = skinMat;
        const handL = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), handMat);
        handL.position.set(-0.45, 0.85, 0.45);
        zombie.add(handL);
        const handR = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), handMat);
        handR.position.set(0.45, 0.85, 0.45);
        zombie.add(handR);

        // Legs - torn pants
        const pantsMat = new THREE.MeshBasicMaterial({ color: 0x444466 });
        const legL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.2), pantsMat);
        legL.position.set(-0.15, 0.45, 0);
        zombie.add(legL);
        const legR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.2), pantsMat);
        legR.position.set(0.15, 0.45, 0);
        zombie.add(legR);

        // Feet
        const feetMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
        const footL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, 0.25), feetMat);
        footL.position.set(-0.15, 0.05, 0.05);
        zombie.add(footL);
        const footR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, 0.25), feetMat);
        footR.position.set(0.15, 0.05, 0.05);
        zombie.add(footR);

        // Spawn position
        const angle = Math.random() * Math.PI * 2;
        const dist = 20 + Math.random() * 20;
        zombie.position.set(
            player.x + Math.cos(angle) * dist,
            0,
            player.z + Math.sin(angle) * dist
        );

        const speed = 0.02 + Math.random() * 0.015 + wave * 0.002;
        const data = { mesh: zombie, health: 50 + wave * 10, speed, lastAttack: 0 };

        scene.add(zombie);
        zombies.push(data);
        zombiesAlive++;
    }

    function spawnWave() {
        const count = wave * 5;
        for (let i = 0; i < count; i++) {
            setTimeout(() => spawnZombie(), i * 500);
        }
        document.getElementById('wave-sub').textContent = `Zumbis restantes: ${count}`;
        announceWave();
        updateWeapon();
    }

    function announceWave() {
        const el = document.getElementById('wave-announce');
        el.textContent = `ONDA ${wave}`;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
        document.getElementById('wave-display').textContent = `ONDA ${wave}`;
    }

    function updateWeapon() {
        const weaponLevel = Math.min(Math.floor((wave - 1) / 2), weapons.length - 1);
        if (weaponLevel !== currentWeapon) {
            currentWeapon = weaponLevel;
            document.getElementById('weapon-display').textContent = weapons[currentWeapon].name;

            // Remove old axe, build new one
            while (weaponGroup.children.length > 0) {
                weaponGroup.remove(weaponGroup.children[0]);
            }
            const newAxe = buildAxe(currentWeapon);
            weaponGroup.add(newAxe);
        }
    }

    function attack() {
        if (attackCooldown > 0) return;
        isAttacking = true;
        attackCooldown = weapons[currentWeapon].speed;

        // Swing animation
        const startRot = weaponGroup.rotation.x;
        weaponGroup.rotation.x = -1.5;
        setTimeout(() => { weaponGroup.rotation.x = startRot; }, 200);

        // Check zombie hits
        const weapon = weapons[currentWeapon];
        const forward = new THREE.Vector3(0, 0, -1);
        forward.applyQuaternion(camera.quaternion);

        zombies.forEach(z => {
            if (z.health <= 0) return;
            const dx = z.mesh.position.x - player.x;
            const dz = z.mesh.position.z - player.z;
            const dist = Math.sqrt(dx * dx + dz * dz);

            if (dist < weapon.range) {
                const toZombie = new THREE.Vector3(dx, 0, dz).normalize();
                const dot = forward.dot(toZombie);
                if (dot > 0.5) {
                    z.health -= weapon.damage;
                    // Knockback
                    z.mesh.position.x += toZombie.x * 0.5;
                    z.mesh.position.z += toZombie.z * 0.5;

                    if (z.health <= 0) {
                        killZombie(z);
                    }
                }
            }
        });
    }

    function killZombie(z) {
        // Death animation - fall over
        z.mesh.rotation.x = Math.PI / 2;
        z.mesh.position.y = 0.3;
        setTimeout(() => {
            scene.remove(z.mesh);
        }, 2000);

        zombiesAlive--;
        kills++;
        score += 10 * wave;
        document.getElementById('kills-count').textContent = kills;
        document.getElementById('score-count').textContent = score;
        document.getElementById('wave-sub').textContent = `Zumbis restantes: ${zombiesAlive}`;

        if (zombiesAlive <= 0) {
            setTimeout(() => {
                wave++;
                spawnWave();
            }, 3000);
        }
    }

    function takeDamage(amount) {
        player.health -= amount;
        damageFlash = 0.3;
        document.getElementById('health-bar').style.width = Math.max(0, player.health) + '%';

        if (player.health > 60) {
            document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #00cc44, #44ff44)';
        } else if (player.health > 30) {
            document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #ccaa00, #ffcc00)';
        } else {
            document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #cc0000, #ff3333)';
        }

        if (player.health <= 0) {
            gameOver();
        }
    }

    function gameOver() {
        gameRunning = false;
        document.exitPointerLock();
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('go-wave').textContent = `Chegou até a Onda ${wave}`;
        document.getElementById('go-kills').textContent = `Zumbis eliminados: ${kills}`;
        document.getElementById('go-score').textContent = `Score: ${score}`;
    }

    function setupControls() {
        document.addEventListener('keydown', e => { keys[e.code] = true; });
        document.addEventListener('keyup', e => { keys[e.code] = false; });
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                playerAngle -= e.movementX * 0.002;
                cameraPitch -= e.movementY * 0.002;
                cameraPitch = Math.max(-1.2, Math.min(1.2, cameraPitch));
            }
        });
        document.addEventListener('mousedown', () => {
            if (!document.pointerLockElement && gameRunning) {
                renderer.domElement.requestPointerLock();
            } else if (gameRunning) {
                attack();
            }
        });
        document.addEventListener('pointerlockchange', () => {});
    }

    function updatePlayer(dt) {
        const speed = keys['ShiftLeft'] ? player.sprint : player.speed;
        let dx = 0, dz = 0;

        if (keys['KeyW']) { dx -= Math.sin(playerAngle) * speed; dz -= Math.cos(playerAngle) * speed; }
        if (keys['KeyS']) { dx += Math.sin(playerAngle) * speed; dz += Math.cos(playerAngle) * speed; }
        if (keys['KeyA']) { dx += Math.cos(playerAngle) * speed; dz -= Math.sin(playerAngle) * speed; }
        if (keys['KeyD']) { dx -= Math.cos(playerAngle) * speed; dz += Math.sin(playerAngle) * speed; }

        // Collision with buildings
        let canMove = true;
        const newX = player.x + dx;
        const newZ = player.z + dz;
        for (const b of buildings) {
            if (Math.abs(newX - b.x) < b.w && Math.abs(newZ - b.z) < b.d) {
                canMove = false;
                break;
            }
        }

        if (canMove) {
            player.x = newX;
            player.z = newZ;
        }

        // Clamp to map
        player.x = Math.max(-55, Math.min(55, player.x));
        player.z = Math.max(-55, Math.min(55, player.z));

        camera.position.set(player.x, player.y, player.z);
        camera.rotation.order = 'YXZ';
        camera.rotation.y = playerAngle;
        camera.rotation.x = cameraPitch;
    }

    function updateZombies(dt) {
        const now = clock.getElapsedTime();

        zombies.forEach(z => {
            if (z.health <= 0) return;

            // Move toward player
            const dx = player.x - z.mesh.position.x;
            const dz = player.z - z.mesh.position.z;
            const dist = Math.sqrt(dx * dx + dz * dz);

            if (dist > 1.5) {
                z.mesh.position.x += (dx / dist) * z.speed;
                z.mesh.position.z += (dz / dist) * z.speed;
                z.mesh.rotation.y = Math.atan2(dx, dz);
            }

            // Walking animation
            const walkCycle = Math.sin(now * 5 + z.mesh.id) * 0.2;
            const legs = z.mesh.children.filter((_, i) => i >= 4);
            if (legs[0]) legs[0].rotation.x = walkCycle;
            if (legs[1]) legs[1].rotation.x = -walkCycle;

            // Arms reach forward
            const arms = z.mesh.children.filter((_, i) => i === 2 || i === 3);
            if (arms[0]) arms[0].rotation.x = -0.5 + Math.sin(now * 3) * 0.1;

            // Attack player
            if (dist < 2 && now - z.lastAttack > 1) {
                z.lastAttack = now;
                takeDamage(8 + wave * 2);
            }
        });
    }

    function animate() {
        if (!gameRunning) return;
        requestAnimationFrame(animate);

        const dt = clock.getDelta();
        attackCooldown = Math.max(0, attackCooldown - dt);

        updatePlayer(dt);
        updateZombies(dt);

        // Weapon bob
        if (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']) {
            const t = clock.getElapsedTime();
            weaponGroup.position.y = -0.4 + Math.sin(t * 8) * 0.03;
            weaponGroup.position.x = 0.4 + Math.cos(t * 4) * 0.02;
        }

        // Damage flash
        if (damageFlash > 0) {
            damageFlash -= dt;
            scene.background.setHex(0x553333);
        } else {
            scene.background.setHex(0x334455);
        }

        renderer.render(scene, camera);
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        init();
        gameRunning = true;
        renderer.domElement.requestPointerLock();
        spawnWave();
        animate();
    }

    function restartGame() {
        document.getElementById('game-over').style.display = 'none';
        // Reset
        zombies.forEach(z => scene.remove(z.mesh));
        zombies = [];
        zombiesAlive = 0;
        wave = 1;
        kills = 0;
        score = 0;
        currentWeapon = 0;
        player.health = 100;
        player.x = 0;
        player.z = 0;
        document.getElementById('health-bar').style.width = '100%';
        document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #00cc44, #44ff44)';
        document.getElementById('kills-count').textContent = '0';
        document.getElementById('score-count').textContent = '0';
        document.getElementById('weapon-display').textContent = weapons[0].name;

        // Reset weapon visual
        while (weaponGroup.children.length > 0) {
            weaponGroup.remove(weaponGroup.children[0]);
        }
        weaponGroup.add(buildAxe(0));

        gameRunning = true;
        renderer.domElement.requestPointerLock();
        spawnWave();
        animate();
    }

    window.addEventListener('resize', () => {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    </script>
    <script src="/stats.js"></script>
    <script>initStats('zombie');</script>
</body>
</html>
