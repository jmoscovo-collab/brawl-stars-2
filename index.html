<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jogo do Davi</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        canvas { border: 3px solid #e94560; border-radius: 8px; }
        #hud { color: #fff; font: bold 16px monospace; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="hud"></div>
    <canvas id="game" width="800" height="500"></canvas>
    <script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

// Audio 8-bit via Web Audio API
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
document.addEventListener('click', () => audioCtx.resume());
document.addEventListener('keydown', () => audioCtx.resume(), { once: true });

function playTone(freq, duration, type = 'square', volume = 0.3) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function sfxJump() {
    playTone(200, 0.1, 'square', 0.2);
    setTimeout(() => playTone(350, 0.1, 'square', 0.2), 50);
}

function sfxCoin() {
    playTone(880, 0.08, 'square', 0.25);
    setTimeout(() => playTone(1200, 0.12, 'square', 0.25), 60);
}

function sfxHit() {
    playTone(120, 0.3, 'sawtooth', 0.4);
    setTimeout(() => playTone(80, 0.3, 'sawtooth', 0.3), 100);
}

function sfxLevelUp() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.15, 'square', 0.25), i * 100));
}

function sfxGameOver() {
    const notes = [400, 350, 300, 200, 150];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.25, 'sawtooth', 0.3), i * 150));
}

const GRAVITY = 0.6;
const JUMP_FORCE = -13;
const MOVE_SPEED = 5;

let level = 1;
let gameOver = false;
let levelComplete = false;
let levelCompleteTimer = 0;

const player = {
    x: 50, y: 300, w: 32, h: 40,
    vx: 0, vy: 0, onGround: false, score: 0, lives: 3
};

let platforms = [];
let coins = [];
let particles = [];

function generateMap(lvl) {
    platforms = [];
    const seed = lvl * 7;

    // chao com buracos — mais buracos em fases maiores
    const gaps = Math.min(2 + Math.floor(lvl / 2), 5);
    let floorX = 0;
    for (let i = 0; i <= gaps; i++) {
        const w = 80 + pseudoRandom(seed + i * 3) * 120;
        platforms.push({ x: floorX, y: 460, w: w, h: 40 });
        floorX += w + 60 + pseudoRandom(seed + i * 7) * 40;
        if (floorX >= 780) break;
    }
    if (floorX < 800) {
        platforms.push({ x: floorX, y: 460, w: 800 - floorX, h: 40 });
    }

    // plataformas flutuantes — mais por fase
    const numPlats = 5 + Math.min(lvl, 6);
    for (let i = 0; i < numPlats; i++) {
        const px = 30 + pseudoRandom(seed + i * 13 + 1) * 680;
        const py = 100 + pseudoRandom(seed + i * 17 + 2) * 300;
        const pw = 80 + pseudoRandom(seed + i * 11 + 3) * 80;
        platforms.push({ x: px, y: py, w: pw, h: 16 });
    }

    // garantir plataforma de spawn perto do player
    platforms.push({ x: 20, y: 380, w: 100, h: 16 });
}

function pseudoRandom(s) {
    const x = Math.sin(s * 9301 + 49297) * 233280;
    return x - Math.floor(x);
}

const capivara = {
    x: 700, y: 420, w: 44, h: 36,
    vx: 0, vy: 0, onGround: false, baseSpeed: 1.5, dir: -1
};

function getCapivaraSpeed() {
    return capivara.baseSpeed + (level - 1) * 0.5;
}

function spawnCoins() {
    coins = [];
    platforms.forEach((p, i) => {
        if (p.h === 40) return; // pular chao
        coins.push({ x: p.x + p.w / 2 - 10, y: p.y - 30, w: 20, h: 20, collected: false });
    });
}

function resetLevel() {
    generateMap(level);
    spawnCoins();
    capivara.x = 700;
    capivara.y = 420;
    capivara.vy = 0;
    levelComplete = false;
}

function nextLevel() {
    level++;
    player.x = 50; player.y = 300; player.vy = 0;
    resetLevel();
}

generateMap(1);
spawnCoins();

const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

function updateCapivara() {
    const speed = getCapivaraSpeed();
    const dx = player.x - capivara.x;
    const dy = player.y - capivara.y;

    if (dx > 10) capivara.dir = 1;
    else if (dx < -10) capivara.dir = -1;

    capivara.vx = capivara.dir * speed;
    capivara.vy += GRAVITY;
    capivara.x += capivara.vx;
    capivara.y += capivara.vy;

    if (capivara.x < 0) capivara.x = 0;
    if (capivara.x + capivara.w > canvas.width) capivara.x = canvas.width - capivara.w;

    capivara.onGround = false;
    for (const p of platforms) {
        if (capivara.x + capivara.w > p.x && capivara.x < p.x + p.w &&
            capivara.y + capivara.h > p.y && capivara.y + capivara.h < p.y + p.h + 10 &&
            capivara.vy >= 0) {
            capivara.y = p.y - capivara.h;
            capivara.vy = 0;
            capivara.onGround = true;
        }
    }

    if (capivara.onGround && dy < -50 && Math.abs(dx) < 200) {
        capivara.vy = JUMP_FORCE * 0.8;
    }

    if (capivara.y > canvas.height) {
        capivara.x = 400; capivara.y = 0; capivara.vy = 0;
    }

    if (player.x + player.w > capivara.x + 4 && player.x < capivara.x + capivara.w - 4 &&
        player.y + player.h > capivara.y + 4 && player.y < capivara.y + capivara.h - 4) {
        player.lives--;
        if (player.lives <= 0) { gameOver = true; sfxGameOver(); return; }
        sfxHit();
        player.x = 50; player.y = 300; player.vy = 0;
        capivara.x = 700; capivara.y = 420; capivara.vy = 0;
    }
}

function update() {
    if (gameOver) return;
    if (levelComplete) {
        levelCompleteTimer--;
        if (levelCompleteTimer <= 0) nextLevel();
        return;
    }

    if (keys['ArrowLeft'] || keys['KeyA']) player.vx = -MOVE_SPEED;
    else if (keys['ArrowRight'] || keys['KeyD']) player.vx = MOVE_SPEED;
    else player.vx = 0;

    if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
        sfxJump();
    }

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    if (player.x < 0) player.x = 0;
    if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

    player.onGround = false;
    for (const p of platforms) {
        if (player.x + player.w > p.x && player.x < p.x + p.w &&
            player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10 &&
            player.vy >= 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
        }
    }

    if (player.y > canvas.height) {
        player.lives--;
        if (player.lives <= 0) { gameOver = true; sfxGameOver(); return; }
        sfxHit();
        player.x = 50; player.y = 300; player.vy = 0;
    }

    for (const coin of coins) {
        if (coin.collected) continue;
        if (player.x + player.w > coin.x && player.x < coin.x + coin.w &&
            player.y + player.h > coin.y && player.y < coin.y + coin.h) {
            coin.collected = true;
            player.score += 10;
            sfxCoin();
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: coin.x + 10, y: coin.y + 10,
                    vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
                    life: 30, color: `hsl(${40 + Math.random() * 20}, 100%, 60%)`
                });
            }
        }
    }

    if (coins.every(c => c.collected)) {
        levelComplete = true;
        levelCompleteTimer = 90;
        sfxLevelUp();
    }

    updateCapivara();

    particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.life--;
        return p.life > 0;
    });
}

function drawCapivara() {
    const cx = capivara.x;
    const cy = capivara.y;
    const facing = capivara.dir;

    // corpo marrom
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.ellipse(cx + 22, cy + 22, 20, 14, 0, 0, Math.PI * 2);
    ctx.fill();

    // barriga
    ctx.fillStyle = '#A0522D';
    ctx.beginPath();
    ctx.ellipse(cx + 22, cy + 26, 14, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    // cabeca
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    const headX = facing > 0 ? cx + 36 : cx + 8;
    ctx.ellipse(headX, cy + 14, 10, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    // focinho
    ctx.fillStyle = '#D2691E';
    ctx.beginPath();
    const noseX = facing > 0 ? cx + 43 : cx + 1;
    ctx.ellipse(noseX, cy + 16, 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // olho
    ctx.fillStyle = '#000';
    const eyeX = facing > 0 ? cx + 38 : cx + 6;
    ctx.beginPath();
    ctx.arc(eyeX, cy + 12, 3, 0, Math.PI * 2);
    ctx.fill();

    // olho brilho
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(eyeX + 1, cy + 11, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // pernas
    ctx.fillStyle = '#654321';
    ctx.fillRect(cx + 8, cy + 30, 6, 6);
    ctx.fillRect(cx + 30, cy + 30, 6, 6);

    // orelhinhas
    ctx.fillStyle = '#6B3A10';
    const ear1X = facing > 0 ? cx + 32 : cx + 4;
    const ear2X = facing > 0 ? cx + 38 : cx + 10;
    ctx.beginPath();
    ctx.ellipse(ear1X, cy + 6, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(ear2X, cy + 5, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
}

function draw() {
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < 50; i++) {
        ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.4})`;
        ctx.fillRect((i * 37 + Date.now() * 0.01) % canvas.width, (i * 23) % canvas.height, 2, 2);
    }

    ctx.fillStyle = '#0f3460';
    for (const p of platforms) {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#e94560';
        ctx.fillRect(p.x, p.y, p.w, 4);
        ctx.fillStyle = '#0f3460';
    }

    for (const coin of coins) {
        if (coin.collected) continue;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(coin.x + 10, coin.y + 10, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffed4a';
        ctx.beginPath();
        ctx.arc(coin.x + 8, coin.y + 8, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    for (const p of particles) {
        ctx.globalAlpha = p.life / 30;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
    }
    ctx.globalAlpha = 1;

    drawCapivara();

    // player
    ctx.fillStyle = '#e94560';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#ff6b6b';
    ctx.fillRect(player.x + 4, player.y + 4, player.w - 8, player.h - 16);
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.x + 8, player.y + 10, 6, 6);
    ctx.fillRect(player.x + 18, player.y + 10, 6, 6);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(player.x + 10, player.y + 12, 3, 3);
    ctx.fillRect(player.x + 20, player.y + 12, 3, 3);

    // HUD
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.fillText(`Moedas: ${player.score}`, 20, 30);
    ctx.fillStyle = '#ffd700';
    ctx.fillText(`Fase ${level}`, 370, 30);
    ctx.fillStyle = '#e94560';
    ctx.fillText('♥'.repeat(player.lives), 680, 30);

    if (levelComplete) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 42px monospace';
        ctx.fillText(`FASE ${level} COMPLETA!`, 180, 250);
        ctx.fillStyle = '#fff';
        ctx.font = '20px monospace';
        ctx.fillText('Capivara ficando mais rapida...', 230, 300);
    }

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 48px monospace';
        ctx.fillText('GAME OVER', 250, 220);
        ctx.fillStyle = '#fff';
        ctx.font = '24px monospace';
        ctx.fillText(`Pontos: ${player.score}`, 320, 270);
        ctx.fillText(`Fase: ${level}`, 350, 310);
        ctx.fillText('Aperte R pra jogar de novo', 220, 360);
    }
}

document.addEventListener('keydown', e => {
    if (e.code === 'KeyR' && gameOver) {
        player.x = 50; player.y = 300; player.vx = 0; player.vy = 0;
        player.score = 0; player.lives = 3; gameOver = false;
        level = 1;
        resetLevel();
    }
});

function loop() {
    update();
    draw();
    hud.textContent = `Velocidade capivara: ${getCapivaraSpeed().toFixed(1)}x`;
    requestAnimationFrame(loop);
}
loop();
    </script>
</body>
</html>
