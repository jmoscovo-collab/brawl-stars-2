<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Capivara Run</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
        canvas { border-radius: 8px; background: #87ceeb; display: block; max-width: 100vw; max-height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        #menu { display: flex; flex-direction: column; align-items: center; gap: 20px; pointer-events: auto; }
        #menu h1 { font-size: 42px; color: #fff; text-shadow: 3px 3px 0 #8b4513; }
        #menu p { color: #ccc; font-size: 16px; }
        #menu button { padding: 15px 50px; font-size: 20px; font-weight: bold; background: #4caf50; color: #fff; border: none; border-radius: 30px; cursor: pointer; }
        #menu button:hover { background: #66bb6a; transform: scale(1.05); }
        .hidden { display: none !important; }
        #hud { position: absolute; top: 10px; left: 0; right: 0; display: flex; justify-content: space-around; pointer-events: none; }
        #hud span { color: #fff; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
        #gameover { display: none; flex-direction: column; align-items: center; gap: 15px; pointer-events: auto; }
        #gameover h1 { font-size: 38px; color: #ff4444; text-shadow: 2px 2px 0 #000; }
        #gameover p { color: #fff; font-size: 18px; }
        #gameover button { padding: 12px 40px; font-size: 18px; background: #ff9800; color: #fff; border: none; border-radius: 25px; cursor: pointer; }
        #touch-controls { position: absolute; bottom: 20px; left: 0; right: 0; display: none; justify-content: space-between; padding: 0 30px; pointer-events: auto; }
        #touch-controls button { width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); font-size: 28px; color: #fff; }
        @media (pointer: coarse) { #touch-controls { display: flex; } }
        .version { position: absolute; bottom: 5px; right: 10px; color: rgba(255,255,255,0.3); font: 11px monospace; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="500"></canvas>
    <div id="ui">
        <div id="menu">
            <h1>🐾 Capivara Run</h1>
            <p>Colete moedas e fuja do monstro!</p>
            <button id="btn-start">JOGAR</button>
            <p style="font-size:12px;color:#888">Setas / Touch pra mover, Espaço / Botão pra pular</p>
        </div>
        <div id="gameover" class="hidden">
            <h1>GAME OVER!</h1>
            <p id="go-text"></p>
            <button id="btn-retry">TENTAR DE NOVO</button>
        </div>
    </div>
    <div id="hud" class="hidden">
        <span id="hud-fase">Fase 1</span>
        <span id="hud-moedas">Moedas: 0/5</span>
        <span id="hud-vidas">❤️❤️❤️</span>
    </div>
    <div id="touch-controls">
        <button id="btn-left">◀</button>
        <button id="btn-jump">⬆</button>
        <button id="btn-right">▶</button>
    </div>
    <div class="version">v1.0.0</div>

    <script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
document.addEventListener('click', () => audioCtx.resume());
function playTone(freq, dur, type='square', vol=0.12) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxJump() { playTone(400, 0.08); playTone(600, 0.08); }
function sfxCoin() { playTone(988, 0.05); setTimeout(() => playTone(1319, 0.1), 50); }
function sfxHit() { playTone(100, 0.2, 'sawtooth', 0.2); }
function sfxLevelUp() { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.1), i*80)); }
function sfxDie() { [400,300,200,100].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sawtooth', 0.2), i*120)); }

// Game state
let gameRunning = false, fase = 1, moedas = 0, totalMoedas = 5, vidas = 3;
let platforms = [], coins = [], monster = null;
const player = { x: 50, y: 300, w: 30, h: 35, vx: 0, vy: 0, onGround: false, facing: 1 };
const GRAVITY = 0.6, JUMP = -13, SPEED = 5;
const keys = {};

document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') e.preventDefault(); });
document.addEventListener('keyup', e => keys[e.code] = false);

// Touch
let touchLeft = false, touchRight = false, touchJump = false;
document.getElementById('btn-left').addEventListener('touchstart', e => { e.preventDefault(); touchLeft = true; });
document.getElementById('btn-left').addEventListener('touchend', () => touchLeft = false);
document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); touchRight = true; });
document.getElementById('btn-right').addEventListener('touchend', () => touchRight = false);
document.getElementById('btn-jump').addEventListener('touchstart', e => { e.preventDefault(); touchJump = true; });
document.getElementById('btn-jump').addEventListener('touchend', () => touchJump = false);

function generateLevel() {
    platforms = [];
    coins = [];
    moedas = 0;
    totalMoedas = 5 + Math.floor(fase * 1.5);
    player.x = 50; player.y = 350; player.vx = 0; player.vy = 0;

    // Ground — always starts at 0 with solid floor, small gaps
    const groundY = 460;
    let gx = 0;
    // First platform always under player
    platforms.push({ x: 0, y: groundY, w: 150, h: 40, color: '#5d4037' });
    gx = 150;
    while (gx < 800) {
        const gap = 25 + Math.random() * Math.min(30, 15 + fase * 3);
        gx += gap;
        const w = 70 + Math.random() * 100;
        platforms.push({ x: gx, y: groundY, w, h: 40, color: '#5d4037' });
        gx += w;
    }

    // Floating platforms
    const numPlats = 5 + fase;
    for (let i = 0; i < numPlats; i++) {
        const x = 50 + Math.random() * 650;
        const y = 200 + Math.random() * 200;
        const w = 60 + Math.random() * 70;
        platforms.push({ x, y, w, h: 15, color: '#795548' });
    }

    // Coins — placed on platforms
    for (let i = 0; i < totalMoedas; i++) {
        const p = platforms[Math.floor(Math.random() * platforms.length)];
        coins.push({ x: p.x + 10 + Math.random() * Math.max(10, p.w - 30), y: p.y - 30, collected: false });
    }

    // Monster (capivara) — starts far from player
    const monsterSpeed = 0.8 + fase * 0.3;
    monster = { x: 700, y: groundY - 40, w: 40, h: 40, speed: monsterSpeed, vy: 0, onGround: false };
}

function update() {
    if (!gameRunning) return;

    // Input
    let moveX = 0;
    if (keys['ArrowLeft'] || keys['KeyA'] || touchLeft) moveX = -1;
    if (keys['ArrowRight'] || keys['KeyD'] || touchRight) moveX = 1;
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchJump) && player.onGround) {
        player.vy = JUMP;
        player.onGround = false;
        sfxJump();
        touchJump = false;
    }

    player.vx = moveX * SPEED;
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;
    if (moveX !== 0) player.facing = moveX;

    // Platform collision
    player.onGround = false;
    for (const p of platforms) {
        if (player.x + player.w > p.x && player.x < p.x + p.w &&
            player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10 && player.vy >= 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
        }
    }

    // Fall off screen
    if (player.y > 550) {
        vidas--;
        sfxHit();
        if (vidas <= 0) { endGame(); return; }
        player.x = 50; player.y = 300; player.vy = 0;
    }

    // Bounds
    if (player.x < 0) player.x = 0;
    if (player.x > 770) player.x = 770;

    // Coins
    for (const c of coins) {
        if (c.collected) continue;
        if (Math.abs(player.x + 15 - c.x - 8) < 20 && Math.abs(player.y + 17 - c.y - 8) < 20) {
            c.collected = true;
            moedas++;
            sfxCoin();
            if (moedas >= totalMoedas) { nextLevel(); return; }
        }
    }

    // Monster AI — walks on ground chasing player
    // Gravity
    monster.vy = (monster.vy || 0) + GRAVITY;
    monster.y += monster.vy;
    monster.onGround = false;

    // Monster platform collision
    for (const p of platforms) {
        if (monster.x + monster.w > p.x && monster.x < p.x + p.w &&
            monster.y + monster.h > p.y && monster.y + monster.h < p.y + p.h + 10 && monster.vy >= 0) {
            monster.y = p.y - monster.h;
            monster.vy = 0;
            monster.onGround = true;
        }
    }

    // Chase player horizontally
    if (player.x > monster.x + 5) monster.x += monster.speed;
    else if (player.x < monster.x - 5) monster.x -= monster.speed;

    // Jump if player is above and monster is on ground
    if (monster.onGround && player.y < monster.y - 50) {
        monster.vy = JUMP * 0.8;
    }

    // Keep in bounds
    if (monster.x < 0) monster.x = 0;
    if (monster.x > 760) monster.x = 760;
    if (monster.y > 550) { monster.y = 420; monster.vy = 0; monster.x = 700; }

    // Monster hits player
    if (Math.abs(player.x - monster.x) < 30 && Math.abs(player.y - monster.y) < 35) {
        vidas--;
        sfxHit();
        if (vidas <= 0) { endGame(); return; }
        player.x = 50; player.y = 300; player.vy = 0;
        monster.x = 700; monster.y = 430;
    }

    updateHUD();
}

function nextLevel() {
    fase++;
    sfxLevelUp();
    generateLevel();
}

function endGame() {
    gameRunning = false;
    sfxDie();
    document.getElementById('gameover').classList.remove('hidden');
    document.getElementById('go-text').textContent = `Voce chegou na fase ${fase} com ${moedas} moedas!`;
    document.getElementById('hud').classList.add('hidden');
}

function updateHUD() {
    document.getElementById('hud-fase').textContent = `Fase ${fase}`;
    document.getElementById('hud-moedas').textContent = `Moedas: ${moedas}/${totalMoedas}`;
    document.getElementById('hud-vidas').textContent = '❤️'.repeat(vidas);
}

function draw() {
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, 500);
    grad.addColorStop(0, '#87ceeb');
    grad.addColorStop(1, '#e0f7fa');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 800, 500);

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(150, 60, 30, 0, Math.PI*2); ctx.arc(180, 55, 25, 0, Math.PI*2); ctx.arc(200, 65, 20, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(550, 80, 25, 0, Math.PI*2); ctx.arc(580, 75, 20, 0, Math.PI*2); ctx.fill();

    // Platforms
    for (const p of platforms) {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // Grass top
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(p.x, p.y, p.w, 4);
    }

    // Coins
    for (const c of coins) {
        if (c.collected) continue;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath(); ctx.arc(c.x + 8, c.y + 8, 8, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffeb3b';
        ctx.beginPath(); ctx.arc(c.x + 6, c.y + 6, 3, 0, Math.PI * 2); ctx.fill();
    }

    // Player (simple character)
    ctx.save();
    ctx.translate(player.x + 15, player.y + 17);
    ctx.scale(player.facing, 1);
    // Body
    ctx.fillStyle = '#2196f3';
    ctx.fillRect(-12, -8, 24, 26);
    // Head
    ctx.fillStyle = '#ffcc80';
    ctx.beginPath(); ctx.arc(0, -14, 12, 0, Math.PI * 2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#333';
    ctx.fillRect(2, -17, 4, 4);
    // Legs
    ctx.fillStyle = '#1565c0';
    ctx.fillRect(-10, 18, 8, 10);
    ctx.fillRect(2, 18, 8, 10);
    ctx.restore();

    // Monster (capivara)
    if (monster) {
        ctx.save();
        ctx.translate(monster.x + 20, monster.y + 20);
        // Body
        ctx.fillStyle = '#8d6e63';
        ctx.beginPath(); ctx.ellipse(0, 5, 22, 16, 0, 0, Math.PI * 2); ctx.fill();
        // Head
        ctx.fillStyle = '#a1887f';
        ctx.beginPath(); ctx.ellipse(15, -5, 14, 12, 0.2, 0, Math.PI * 2); ctx.fill();
        // Eyes (angry red)
        ctx.fillStyle = '#ff1744';
        ctx.beginPath(); ctx.arc(22, -8, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(22, -8, 2, 0, Math.PI * 2); ctx.fill();
        // Nose
        ctx.fillStyle = '#5d4037';
        ctx.beginPath(); ctx.ellipse(28, -2, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
        // Ears
        ctx.fillStyle = '#795548';
        ctx.beginPath(); ctx.arc(10, -14, 5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(18, -15, 5, 0, Math.PI * 2); ctx.fill();
        // Teeth
        ctx.fillStyle = '#fff';
        ctx.fillRect(25, 2, 3, 5);
        ctx.fillRect(29, 2, 3, 5);
        ctx.restore();
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function startGame() {
    fase = 1; vidas = 3; moedas = 0;
    generateLevel();
    gameRunning = true;
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('gameover').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
}

document.getElementById('btn-start').onclick = startGame;
document.getElementById('btn-retry').onclick = startGame;

// Resize canvas for mobile
function resize() {
    const ratio = 800/500;
    let w = window.innerWidth, h = window.innerHeight;
    if (w/h > ratio) { canvas.style.height = h+'px'; canvas.style.width = (h*ratio)+'px'; }
    else { canvas.style.width = w+'px'; canvas.style.height = (w/ratio)+'px'; }
}
window.addEventListener('resize', resize);
resize();

gameLoop();
    </script>
</body>
</html>
