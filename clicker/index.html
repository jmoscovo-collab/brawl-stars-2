<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Capivara Clicker — clique na capivara e faça a pontuação subir! Jogo grátis do Cogumelo Games.">
    <meta property="og:title" content="Capivara Clicker — Cogumelo Games">
    <meta property="og:description" content="Clique na capivara e faça a pontuação subir! Quanto mais clica, mais pontua!">
    <link rel="canonical" href="https://cogumelogames.com.br/clicker/">
    <title>Cogumelo Clicker — Cogumelo Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a27 50%, #1a3a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #score {
            font-size: 48px;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 30px;
        }
        #capivara {
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }
        #capivara:active {
            transform: scale(0.9);
        }
        #capivara canvas {
            width: 100%;
            height: 100%;
        }
        .click-effect {
            position: absolute;
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 1px 1px 0 #000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
        }
        .title {
            font-size: 28px;
            color: #a5d6a7;
            margin-bottom: 10px;
            text-shadow: 1px 1px 0 #000;
        }
        .best {
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-family: monospace;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }
        .game-area { display: flex; align-items: center; gap: 40px; }
        #upgrade-box {
            background: rgba(0,0,0,0.4);
            border: 3px solid #444;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            width: 160px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #upgrade-box:hover { border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.3); transform: scale(1.05); }
        #upgrade-box.locked { opacity: 0.4; cursor: not-allowed; }
        #upgrade-box.locked:hover { border-color: #444; box-shadow: none; transform: none; }
        #upgrade-box .up-title { color: #ffd700; font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        #upgrade-box .up-desc { color: #aaa; font-size: 12px; margin-bottom: 10px; }
        #upgrade-box .up-cost { color: #ff5722; font-size: 14px; font-weight: bold; }
        #upgrade-box .up-level { color: #4caf50; font-size: 12px; margin-top: 8px; }
        #click-power { color: #aaa; font-size: 14px; margin-top: 10px; }
        #btn-academia { margin-top: 15px; padding: 12px 30px; background: #7c4dff; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: monospace; }
        #btn-academia:hover { transform: scale(1.05); background: #651fff; }
        #academia-screen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; z-index: 500; }
        #academia-screen h1 { font-size: 32px; color: #fff; margin-bottom: 5px; text-shadow: 2px 2px 0 #7c4dff; }
        #academia-screen .speed-display { color: #aaa; font-size: 16px; margin-bottom: 20px; }
        .esteiras { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; max-width: 800px; width: 100%; }
        .esteira-card { background: rgba(30, 30, 70, 0.9); border: 3px solid #444; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .esteira-card:hover { border-color: #7c4dff; transform: scale(1.03); }
        .esteira-card.locked { opacity: 0.4; cursor: not-allowed; }
        .esteira-card.locked:hover { border-color: #444; transform: none; }
        .esteira-card.active { border-color: #4caf50; box-shadow: 0 0 15px rgba(76,175,80,0.4); }
        .esteira-card .est-icon { font-size: 40px; margin-bottom: 8px; }
        .esteira-card .est-name { color: #fff; font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .esteira-card .est-req { color: #aaa; font-size: 12px; }
        .esteira-card .est-bonus { color: #4caf50; font-size: 12px; margin-top: 5px; }
        .esteira-card.coming-soon { opacity: 0.5; cursor: default; border-style: dashed; }
        #academia-back { margin-top: 20px; padding: 12px 40px; font-size: 18px; background: #ff9800; color: #fff; border: none; border-radius: 25px; cursor: pointer; font-family: monospace; }
        #academia-back:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Voltar</a>
    <div class="title">🍄 Cogumelo Clicker</div>
    <div id="score">0</div>
    <div class="game-area">
        <div id="capivara">
            <canvas id="capi-canvas" width="200" height="200"></canvas>
        </div>
        <div id="upgrade-box" class="locked">
            <div class="up-title">⬆️ UPGRADE</div>
            <div class="up-desc">+5 por clique</div>
            <div class="up-cost">Custo: 100</div>
            <div class="up-level" id="up-level">Nível: 0</div>
        </div>
    </div>
    <div id="click-power">Clique: +1</div>
    <button id="btn-academia">🏋️ ACADEMIA</button>
    <div class="best" id="best">Recorde: 0</div>

    <div id="academia-screen">
        <h1>🏋️ ACADEMIA</h1>
        <div class="speed-display">Velocidade: <span id="speed-val">0</span></div>
        <div class="esteiras" id="esteiras-grid"></div>
        <button id="academia-back">VOLTAR</button>
    </div>

    <script>
let score = 0;
let clickPower = 1;
let upgradeLevel = 0;
let upgradeCost = 100;
let best = parseInt(localStorage.getItem('capivara_clicker_best') || '0');
document.getElementById('best').textContent = `Recorde: ${best}`;

const upgradeBox = document.getElementById('upgrade-box');

function updateUpgradeBox() {
    if (score >= upgradeCost) {
        upgradeBox.classList.remove('locked');
    } else {
        upgradeBox.classList.add('locked');
    }
}

upgradeBox.addEventListener('click', () => {
    if (score >= upgradeCost) {
        score -= upgradeCost;
        upgradeLevel++;
        clickPower += 5;
        upgradeCost = 100 * (upgradeLevel + 1);
        scoreEl.textContent = score;
        document.getElementById('up-level').textContent = `Nível: ${upgradeLevel}`;
        document.getElementById('click-power').textContent = `Clique: +${clickPower}`;
        document.querySelector('.up-cost').textContent = `Custo: ${upgradeCost}`;
        updateUpgradeBox();
    }
});

const capiDiv = document.getElementById('capivara');
const scoreEl = document.getElementById('score');

function drawCogumelo() {
    const canvas = document.getElementById('capi-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 200, 200);

    ctx.save();
    ctx.translate(100, 105);
    ctx.scale(3, 3);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(0, 28, 14, 5, 0, 0, Math.PI*2); ctx.fill();

    // Stem
    ctx.fillStyle = '#f5f5dc';
    ctx.fillRect(-10, 5, 20, 24);
    ctx.fillStyle = '#ede7d9';
    ctx.fillRect(-10, 5, 4, 24);

    // Cap
    ctx.fillStyle = '#e53935';
    ctx.beginPath(); ctx.ellipse(0, -2, 22, 18, 0, Math.PI, 0); ctx.fill();
    // Cap darker bottom
    ctx.fillStyle = '#c62828';
    ctx.beginPath(); ctx.ellipse(0, -2, 22, 5, 0, 0, Math.PI); ctx.fill();

    // Spots
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-10, -12, 5.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, -15, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -7, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-15, -5, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(14, -6, 3.5, 0, Math.PI*2); ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-5, 12, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, 12, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(-5, 12, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, 12, 2.2, 0, Math.PI*2); ctx.fill();
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-5.5, 11, 0.9, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4.5, 11, 0.9, 0, Math.PI*2); ctx.fill();

    // Smile
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(0, 16, 5, 0.1, Math.PI - 0.1); ctx.stroke();

    // Blush
    ctx.fillStyle = 'rgba(255,138,128,0.4)';
    ctx.beginPath(); ctx.arc(-9, 15, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9, 15, 3, 0, Math.PI*2); ctx.fill();

    // Feet
    ctx.fillStyle = '#8d6e63';
    ctx.fillRect(-9, 27, 7, 5);
    ctx.fillRect(2, 27, 7, 5);

    ctx.restore();
}

drawCogumelo();

// Academia
const ESTEIRAS = [
    { name: 'Esteira 1', icon: '🏃', req: 0, bonus: 1, desc: 'Grátis!' },
    { name: 'Esteira 2', icon: '🏃‍♂️', req: 800, bonus: 3, desc: '800 velocidade' },
    { name: 'Esteira 3', icon: '⚡', req: 5000, bonus: 10, desc: '5.000 velocidade' },
    { name: 'Esteira 4', icon: '🔥', req: 50000, bonus: 25, desc: '50.000 velocidade' },
    { name: 'Esteira 5', icon: '💨', req: 200000, bonus: 50, desc: '200.000 velocidade' },
    { name: 'Esteira 6', icon: '🚀', req: 500000, bonus: 100, desc: '500.000 velocidade' },
    { name: 'Esteira 7', icon: '☄️', req: 1000000, bonus: 200, desc: '1.000.000 velocidade' },
];
let currentEsteira = 0;
let speed = 0;

function renderEsteiras() {
    const grid = document.getElementById('esteiras-grid');
    grid.innerHTML = '';
    document.getElementById('speed-val').textContent = speed.toLocaleString();
    for (let i = 0; i < ESTEIRAS.length; i++) {
        const est = ESTEIRAS[i];
        const unlocked = speed >= est.req;
        const active = currentEsteira === i;
        const card = document.createElement('div');
        card.className = 'esteira-card' + (!unlocked ? ' locked' : '') + (active ? ' active' : '');
        card.innerHTML = `
            <div class="est-icon">${est.icon}</div>
            <div class="est-name">${est.name}</div>
            <div class="est-req">${est.req === 0 ? '🆓 Grátis' : '🔒 ' + est.req.toLocaleString() + ' vel.'}</div>
            <div class="est-bonus">+${est.bonus} vel/clique</div>
        `;
        if (unlocked) {
            card.onclick = () => { currentEsteira = i; renderEsteiras(); };
        }
        grid.appendChild(card);
    }
    // Coming soon card
    const soon = document.createElement('div');
    soon.className = 'esteira-card coming-soon';
    soon.innerHTML = `
        <div class="est-icon">🔮</div>
        <div class="est-name">???</div>
        <div class="est-req">Na próxima atualização...</div>
    `;
    grid.appendChild(soon);
}

document.getElementById('btn-academia').onclick = () => {
    document.getElementById('academia-screen').style.display = 'flex';
    renderEsteiras();
};
document.getElementById('academia-back').onclick = () => {
    document.getElementById('academia-screen').style.display = 'none';
};

capiDiv.addEventListener('click', (e) => {
    score += clickPower;
    speed += ESTEIRAS[currentEsteira].bonus;
    scoreEl.textContent = score;
    document.getElementById('speed-val').textContent = speed.toLocaleString();

    if (score > best) {
        best = score;
        localStorage.setItem('capivara_clicker_best', best);
        document.getElementById('best').textContent = `Recorde: ${best}`;
    }

    updateUpgradeBox();

    // floating effect
    const effect = document.createElement('div');
    effect.className = 'click-effect';
    effect.textContent = `+${clickPower}`;
    effect.style.left = (e.offsetX - 10) + 'px';
    effect.style.top = (e.offsetY - 20) + 'px';
    capiDiv.appendChild(effect);
    setTimeout(() => effect.remove(), 800);
});
    </script>
</body>
</html>
