<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Capivara Clicker — clique na capivara e faça a pontuação subir! Jogo grátis do Cogumelo Games.">
    <meta property="og:title" content="Capivara Clicker — Cogumelo Games">
    <meta property="og:description" content="Clique na capivara e faça a pontuação subir! Quanto mais clica, mais pontua!">
    <link rel="canonical" href="https://cogumelogames.com.br/clicker/">
    <title>Capivara Clicker — Cogumelo Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a27 50%, #1a3a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #score {
            font-size: 48px;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 30px;
        }
        #capivara {
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }
        #capivara:active {
            transform: scale(0.9);
        }
        #capivara canvas {
            width: 100%;
            height: 100%;
        }
        .click-effect {
            position: absolute;
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 1px 1px 0 #000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
        }
        .title {
            font-size: 28px;
            color: #a5d6a7;
            margin-bottom: 10px;
            text-shadow: 1px 1px 0 #000;
        }
        .best {
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-family: monospace;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Voltar</a>
    <div class="title">🐾 Capivara Clicker</div>
    <div id="score">0</div>
    <div id="capivara">
        <canvas id="capi-canvas" width="200" height="200"></canvas>
    </div>
    <div class="best" id="best">Recorde: 0</div>

    <script>
let score = 0;
let best = parseInt(localStorage.getItem('capivara_clicker_best') || '0');
document.getElementById('best').textContent = `Recorde: ${best}`;

const capiDiv = document.getElementById('capivara');
const scoreEl = document.getElementById('score');

function drawCapivara() {
    const canvas = document.getElementById('capi-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 200, 200);

    ctx.save();
    ctx.translate(100, 110);
    ctx.scale(2.5, 2.5);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 28, 20, 6, 0, 0, Math.PI*2); ctx.fill();

    // Back legs
    ctx.fillStyle = '#5d4037';
    ctx.beginPath(); ctx.ellipse(-12, 22, 5, 8, 0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-5, 22, 5, 8, -0.1, 0, Math.PI*2); ctx.fill();

    // Body
    ctx.fillStyle = '#8d6e63';
    ctx.beginPath(); ctx.ellipse(0, 6, 24, 17, 0, 0, Math.PI*2); ctx.fill();

    // Fur texture
    ctx.strokeStyle = '#795548'; ctx.lineWidth = 0.8;
    for (let i = -16; i < 16; i += 5) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + 2, 10); ctx.stroke();
    }

    // Belly
    ctx.fillStyle = '#a1887f';
    ctx.beginPath(); ctx.ellipse(0, 12, 15, 9, 0, 0, Math.PI); ctx.fill();

    // Front legs
    ctx.fillStyle = '#5d4037';
    ctx.beginPath(); ctx.ellipse(8, 22, 5, 8, -0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(15, 22, 5, 8, 0.1, 0, Math.PI*2); ctx.fill();

    // Head
    ctx.fillStyle = '#9e8070';
    ctx.beginPath(); ctx.ellipse(22, -2, 12, 11, 0.1, 0, Math.PI*2); ctx.fill();

    // Snout
    ctx.fillStyle = '#7b5b4c';
    ctx.beginPath(); ctx.ellipse(32, 3, 8, 6, 0, 0, Math.PI*2); ctx.fill();

    // Nostrils
    ctx.fillStyle = '#3e2723';
    ctx.beginPath(); ctx.ellipse(31, 1, 2, 1.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(35, 1, 2, 1.5, 0, 0, Math.PI*2); ctx.fill();

    // Eye
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(22, -6, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(21, -7, 1.2, 0, Math.PI*2); ctx.fill();

    // Ear
    ctx.fillStyle = '#6d4c41';
    ctx.beginPath(); ctx.arc(17, -12, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8d6e63';
    ctx.beginPath(); ctx.arc(17, -12, 2.5, 0, Math.PI*2); ctx.fill();

    // Mouth smile
    ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(30, 6, 4, 0.1, Math.PI - 0.1); ctx.stroke();

    // Teeth
    ctx.fillStyle = '#ffecb3';
    ctx.fillRect(29, 7, 2.5, 4);
    ctx.fillRect(32, 7, 2.5, 4);

    // Whiskers
    ctx.strokeStyle = '#4e342e'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(36, 2); ctx.lineTo(44, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(36, 4); ctx.lineTo(44, 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(36, 6); ctx.lineTo(43, 8); ctx.stroke();

    ctx.restore();
}

drawCapivara();

capiDiv.addEventListener('click', (e) => {
    score++;
    scoreEl.textContent = score;

    if (score > best) {
        best = score;
        localStorage.setItem('capivara_clicker_best', best);
        document.getElementById('best').textContent = `Recorde: ${best}`;
    }

    // +1 floating effect
    const effect = document.createElement('div');
    effect.className = 'click-effect';
    effect.textContent = '+1';
    effect.style.left = (e.offsetX - 10) + 'px';
    effect.style.top = (e.offsetY - 20) + 'px';
    capiDiv.appendChild(effect);
    setTimeout(() => effect.remove(), 800);
});
    </script>
</body>
</html>
