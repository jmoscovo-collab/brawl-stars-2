<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Capivara Clicker — clique na capivara e faça a pontuação subir! Jogo grátis do Cogumelo Games.">
    <meta property="og:title" content="Capivara Clicker — Cogumelo Games">
    <meta property="og:description" content="Clique na capivara e faça a pontuação subir! Quanto mais clica, mais pontua!">
    <link rel="canonical" href="https://cogumelogames.com.br/clicker/">
    <title>Cogumelo Clicker — Cogumelo Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a27 50%, #1a3a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #score {
            font-size: 48px;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 30px;
        }
        #capivara {
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }
        #capivara:active {
            transform: scale(0.9);
        }
        #capivara canvas {
            width: 100%;
            height: 100%;
        }
        .click-effect {
            position: absolute;
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 1px 1px 0 #000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
        }
        .title {
            font-size: 28px;
            color: #a5d6a7;
            margin-bottom: 10px;
            text-shadow: 1px 1px 0 #000;
        }
        .best {
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-family: monospace;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }
        .game-area { display: flex; align-items: center; gap: 40px; }
        #upgrade-box {
            background: rgba(0,0,0,0.4);
            border: 3px solid #444;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            width: 160px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #upgrade-box:hover { border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.3); transform: scale(1.05); }
        #upgrade-box.locked { opacity: 0.4; cursor: not-allowed; }
        #upgrade-box.locked:hover { border-color: #444; box-shadow: none; transform: none; }
        #upgrade-box .up-title, #upgrade-box2 .up-title { color: #ffd700; font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        #upgrade-box .up-desc, #upgrade-box2 .up-desc { color: #aaa; font-size: 12px; margin-bottom: 10px; }
        #upgrade-box .up-cost, #upgrade-box2 .up-cost { color: #ff5722; font-size: 14px; font-weight: bold; }
        #upgrade-box .up-level, #upgrade-box2 .up-level { color: #4caf50; font-size: 12px; margin-top: 8px; }
        #upgrade-box2 { background: rgba(0,0,0,0.4); border: 3px solid #444; border-radius: 12px; padding: 20px; text-align: center; width: 160px; cursor: pointer; transition: all 0.2s; }
        #upgrade-box2:hover { border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.3); transform: scale(1.05); }
        #upgrade-box2.locked { opacity: 0.4; cursor: not-allowed; }
        #upgrade-box2.locked:hover { border-color: #444; box-shadow: none; transform: none; }
        #click-power { color: #aaa; font-size: 14px; margin-top: 10px; }
        #btn-academia { margin-top: 15px; padding: 12px 30px; background: #7c4dff; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: monospace; }
        #btn-academia:hover { transform: scale(1.05); background: #651fff; }
        #academia-screen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 500; }
        #academia-3d { width: 100%; height: 100%; }
        #academia-ui { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        #academia-ui h1 { font-size: 28px; color: #fff; margin-top: 15px; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #academia-ui .speed-display { color: #ddd; font-size: 16px; text-shadow: 1px 1px 3px #000; margin-top: 5px; }
        #esteira-hud { position: absolute; bottom: 80px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 0 10px; pointer-events: auto; }
        .est-btn { padding: 8px 14px; background: rgba(30,30,70,0.85); border: 2px solid #444; border-radius: 10px; color: #fff; font-size: 12px; font-family: monospace; cursor: pointer; text-align: center; min-width: 80px; transition: all 0.2s; }
        .est-btn:hover { border-color: #7c4dff; transform: scale(1.05); }
        .est-btn.locked { opacity: 0.35; cursor: not-allowed; }
        .est-btn.locked:hover { border-color: #444; transform: none; }
        .est-btn.active { border-color: #4caf50; box-shadow: 0 0 10px rgba(76,175,80,0.5); }
        .est-btn .est-b-name { font-weight: bold; font-size: 11px; }
        .est-btn .est-b-req { color: #aaa; font-size: 10px; }
        .est-btn.coming-soon { opacity: 0.4; border-style: dashed; cursor: default; }
        #academia-back { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 40px; font-size: 18px; background: #ff9800; color: #fff; border: none; border-radius: 25px; cursor: pointer; font-family: monospace; pointer-events: auto; }
        #academia-back:hover { transform: translateX(-50%) scale(1.05); }
        #btn-corrida { margin-top: 8px; padding: 12px 30px; background: #f44336; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: monospace; }
        #btn-corrida:hover { transform: scale(1.05); background: #d32f2f; }
        #corrida-screen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #87ceeb; z-index: 600; overflow: hidden; }
        #corrida-canvas { width: 100%; height: 100%; display: block; }
        #corrida-hud { position: absolute; top: 10px; left: 0; right: 0; display: flex; justify-content: space-around; color: #fff; font-size: 18px; font-weight: bold; font-family: monospace; text-shadow: 1px 1px 3px #000; pointer-events: none; }
        #corrida-back { position: absolute; top: 10px; left: 10px; padding: 8px 16px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: monospace; z-index: 601; }
        #corrida-result { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 602; }
        #corrida-result h1 { font-size: 40px; color: #fff; text-shadow: 2px 2px 0 #000; }
        #corrida-result p { color: #aaa; font-size: 18px; }
        #corrida-result button { padding: 12px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; font-family: monospace; }
        .btn-next { background: #4caf50; color: #fff; }
        .btn-back-race { background: #ff9800; color: #fff; }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Voltar</a>
    <div class="title">🍄 Cogumelo Clicker</div>
    <div id="score">0</div>
    <div class="game-area">
        <div id="capivara">
            <canvas id="capi-canvas" width="200" height="200"></canvas>
        </div>
        <div id="upgrade-box" class="locked">
            <div class="up-title">⬆️ UPGRADE</div>
            <div class="up-desc">+5 por clique</div>
            <div class="up-cost">Custo: 100</div>
            <div class="up-level" id="up-level">Nível: 0</div>
        </div>
        <div id="upgrade-box2" class="locked">
            <div class="up-title">🚀 MEGA</div>
            <div class="up-desc">+1.000 por clique</div>
            <div class="up-cost" id="up-cost2">Custo: 100.067</div>
            <div class="up-level" id="up-level2">Nível: 0</div>
        </div>
    </div>
    <div id="click-power">Clique: +1</div>
    <button id="btn-academia">🏋️ ACADEMIA</button>
    <button id="btn-corrida">🏁 CORRIDA</button>
    <div class="best" id="best">Recorde: 0</div>

    <div id="corrida-screen">
        <canvas id="corrida-canvas"></canvas>
        <button id="corrida-back">← Voltar</button>
        <div id="corrida-hud">
            <span id="corrida-fase">Fase 1</span>
            <span id="corrida-pos">Posição: 1º</span>
        </div>
        <div id="corrida-result">
            <h1 id="corrida-result-title"></h1>
            <p id="corrida-result-text"></p>
            <button class="btn-next" id="corrida-next">PRÓXIMA FASE</button>
            <button class="btn-back-race" id="corrida-menu">VOLTAR AO MENU</button>
        </div>
    </div>

    <div id="academia-screen">
        <canvas id="academia-3d"></canvas>
        <div id="academia-ui">
            <h1>🏋️ ACADEMIA</h1>
            <div class="speed-display">Velocidade: <span id="speed-val">0</span></div>
        </div>
        <div id="esteira-hud"></div>
        <button id="academia-back">VOLTAR</button>
    </div>

    <script>
let score = 0;
let clickPower = 1;
let upgradeLevel = 0;
let upgradeCost = 100;
let best = parseInt(localStorage.getItem('capivara_clicker_best') || '0');
document.getElementById('best').textContent = `Recorde: ${best}`;

const upgradeBox = document.getElementById('upgrade-box');

function updateUpgradeBox() {
    if (score >= upgradeCost) {
        upgradeBox.classList.remove('locked');
    } else {
        upgradeBox.classList.add('locked');
    }
}

upgradeBox.addEventListener('click', () => {
    if (score >= upgradeCost) {
        score -= upgradeCost;
        upgradeLevel++;
        clickPower += 5;
        upgradeCost = 100 * (upgradeLevel + 1);
        scoreEl.textContent = score;
        document.getElementById('up-level').textContent = `Nível: ${upgradeLevel}`;
        document.getElementById('click-power').textContent = `Clique: +${clickPower}`;
        document.querySelector('.up-cost').textContent = `Custo: ${upgradeCost}`;
        updateUpgradeBox();
    }
});

const capiDiv = document.getElementById('capivara');
const scoreEl = document.getElementById('score');

function drawCogumelo() {
    const canvas = document.getElementById('capi-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 200, 200);

    ctx.save();
    ctx.translate(100, 105);
    ctx.scale(3, 3);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(0, 28, 14, 5, 0, 0, Math.PI*2); ctx.fill();

    // Stem
    ctx.fillStyle = '#f5f5dc';
    ctx.fillRect(-10, 5, 20, 24);
    ctx.fillStyle = '#ede7d9';
    ctx.fillRect(-10, 5, 4, 24);

    // Cap
    ctx.fillStyle = '#e53935';
    ctx.beginPath(); ctx.ellipse(0, -2, 22, 18, 0, Math.PI, 0); ctx.fill();
    // Cap darker bottom
    ctx.fillStyle = '#c62828';
    ctx.beginPath(); ctx.ellipse(0, -2, 22, 5, 0, 0, Math.PI); ctx.fill();

    // Spots
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-10, -12, 5.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, -15, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -7, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-15, -5, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(14, -6, 3.5, 0, Math.PI*2); ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-5, 12, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, 12, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(-5, 12, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, 12, 2.2, 0, Math.PI*2); ctx.fill();
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-5.5, 11, 0.9, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4.5, 11, 0.9, 0, Math.PI*2); ctx.fill();

    // Smile
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(0, 16, 5, 0.1, Math.PI - 0.1); ctx.stroke();

    // Blush
    ctx.fillStyle = 'rgba(255,138,128,0.4)';
    ctx.beginPath(); ctx.arc(-9, 15, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9, 15, 3, 0, Math.PI*2); ctx.fill();

    // Feet
    ctx.fillStyle = '#8d6e63';
    ctx.fillRect(-9, 27, 7, 5);
    ctx.fillRect(2, 27, 7, 5);

    ctx.restore();
}

drawCogumelo();

// Academia
const ESTEIRAS = [
    { name: 'Esteira 1', req: 0, bonus: 10, color: 0x4caf50 },
    { name: 'Esteira 2', req: 800, bonus: 30, color: 0x2196f3 },
    { name: 'Esteira 3', req: 5000, bonus: 100, color: 0xff9800 },
    { name: 'Esteira 4', req: 50000, bonus: 250, color: 0xe91e63 },
    { name: 'Esteira 5', req: 200000, bonus: 500, color: 0x9c27b0 },
    { name: 'Esteira 6', req: 500000, bonus: 1000, color: 0x00bcd4 },
    { name: 'Esteira 7', req: 1000000, bonus: 2000, color: 0xffd700 },
];
let currentEsteira = 0;
let speed = 0;
let academiaScene, academiaCamera, academiaRenderer, academiaBelts = [];
let academiaRunning = false;
let cogumeloMesh = null;
let autoSpeedInterval = null;

function initAcademia3D() {
    if (academiaScene) return;
    const THREE = window.THREE;
    academiaScene = new THREE.Scene();
    academiaScene.background = new THREE.Color(0x1a1a2e);
    academiaScene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

    academiaCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    academiaCamera.position.set(0, 5, 10);
    academiaCamera.lookAt(0, 1, 0);

    academiaRenderer = new THREE.WebGLRenderer({ canvas: document.getElementById('academia-3d'), antialias: true });
    academiaRenderer.setSize(window.innerWidth, window.innerHeight);
    academiaRenderer.shadowMap.enabled = true;

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    academiaScene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    academiaScene.add(dirLight);
    const pointLight = new THREE.PointLight(0x7c4dff, 0.5, 20);
    pointLight.position.set(0, 6, 0);
    academiaScene.add(pointLight);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(30, 20);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.8 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    academiaScene.add(floor);

    // Walls
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.9 });
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 8), wallMat);
    backWall.position.set(0, 4, -10);
    academiaScene.add(backWall);

    // Mirrors on wall
    const mirrorMat = new THREE.MeshStandardMaterial({ color: 0x88aacc, metalness: 0.8, roughness: 0.2 });
    for (let i = -2; i <= 2; i++) {
        const mirror = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 3.5), mirrorMat);
        mirror.position.set(i * 3.5, 4, -9.9);
        academiaScene.add(mirror);
    }

    // Create treadmills — premium design
    for (let i = 0; i < ESTEIRAS.length; i++) {
        const est = ESTEIRAS[i];
        const group = new THREE.Group();
        const x = (i - 3) * 2.4;
        group.position.set(x, 0, 0);

        // Main frame — sleek metallic body
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.7, roughness: 0.3 });
        const frameGeo = new THREE.BoxGeometry(1.4, 0.2, 3.2);
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.position.y = 0.1;
        frame.castShadow = true;
        group.add(frame);

        // Raised platform with color accent
        const platGeo = new THREE.BoxGeometry(1.3, 0.08, 3);
        const platMat = new THREE.MeshStandardMaterial({ color: est.color, metalness: 0.4, roughness: 0.6 });
        const plat = new THREE.Mesh(platGeo, platMat);
        plat.position.y = 0.24;
        group.add(plat);

        // Belt — rubber texture
        const beltGeo = new THREE.BoxGeometry(1.1, 0.04, 2.7);
        const beltMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 });
        const belt = new THREE.Mesh(beltGeo, beltMat);
        belt.position.y = 0.3;
        group.add(belt);

        // Belt grooves (texture lines)
        for (let g = -1.2; g <= 1.2; g += 0.3) {
            const grooveGeo = new THREE.BoxGeometry(1.05, 0.005, 0.02);
            const grooveMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
            const groove = new THREE.Mesh(grooveGeo, grooveMat);
            groove.position.set(0, 0.32, g);
            group.add(groove);
        }

        // Front/back rollers — chrome
        const rollerGeo = new THREE.CylinderGeometry(0.14, 0.14, 1.2, 16);
        const rollerMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.1 });
        const roller1 = new THREE.Mesh(rollerGeo, rollerMat);
        roller1.rotation.z = Math.PI / 2;
        roller1.position.set(0, 0.18, 1.4);
        group.add(roller1);
        const roller2 = roller1.clone();
        roller2.position.z = -1.4;
        group.add(roller2);

        // Side rails — thick chrome tubes
        const railMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
        const railGeo = new THREE.CylinderGeometry(0.04, 0.04, 2.8, 12);
        const leftRail = new THREE.Mesh(railGeo, railMat);
        leftRail.position.set(-0.6, 1.7, -0.2);
        group.add(leftRail);
        const rightRail = leftRail.clone();
        rightRail.position.x = 0.6;
        group.add(rightRail);

        // Curved top handle — ergonomic
        const topGeo = new THREE.TorusGeometry(0.55, 0.035, 8, 16, Math.PI);
        const topBar = new THREE.Mesh(topGeo, railMat);
        topBar.rotation.x = Math.PI / 2;
        topBar.rotation.z = Math.PI;
        topBar.position.set(0, 3.1, -0.2);
        group.add(topBar);

        // Side grip pads
        const gripMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.95 });
        const gripGeo = new THREE.CylinderGeometry(0.055, 0.055, 0.4, 8);
        const gripL = new THREE.Mesh(gripGeo, gripMat);
        gripL.position.set(-0.6, 2.2, -0.2);
        group.add(gripL);
        const gripR = gripL.clone();
        gripR.position.x = 0.6;
        group.add(gripR);

        // Display panel — big screen
        const panelGeo = new THREE.BoxGeometry(0.8, 0.5, 0.06);
        const panelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.3, roughness: 0.4 });
        const panel = new THREE.Mesh(panelGeo, panelMat);
        panel.position.set(0, 2.7, -0.25);
        group.add(panel);

        // Screen glow
        const screenGeo = new THREE.PlaneGeometry(0.7, 0.4);
        const screenMat = new THREE.MeshStandardMaterial({ color: est.color, emissive: est.color, emissiveIntensity: 0.5 });
        const screen = new THREE.Mesh(screenGeo, screenMat);
        screen.position.set(0, 2.7, -0.21);
        group.add(screen);

        // LED strip along sides
        const ledMat = new THREE.MeshStandardMaterial({ color: est.color, emissive: est.color, emissiveIntensity: 0.6 });
        for (let l = -1.2; l <= 1.2; l += 0.4) {
            const ledGeo = new THREE.BoxGeometry(0.03, 0.03, 0.15);
            const ledL = new THREE.Mesh(ledGeo, ledMat);
            ledL.position.set(-0.68, 0.15, l);
            group.add(ledL);
            const ledR = ledL.clone();
            ledR.position.x = 0.68;
            group.add(ledR);
        }

        // Top glow orb
        const glowGeo = new THREE.SphereGeometry(0.1, 12, 12);
        const glowMat = new THREE.MeshStandardMaterial({ color: est.color, emissive: est.color, emissiveIntensity: 0.8 });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.position.set(0, 3.3, -0.2);
        group.add(glow);

        // Speed number on floor in front
        const numMat = new THREE.MeshStandardMaterial({ color: est.color, emissive: est.color, emissiveIntensity: 0.4 });
        const numGeo = new THREE.PlaneGeometry(0.8, 0.3);
        const numPlane = new THREE.Mesh(numGeo, numMat);
        numPlane.rotation.x = -Math.PI / 2;
        numPlane.position.set(0, 0.01, 2);
        group.add(numPlane);

        academiaScene.add(group);
        academiaBelts.push({ group, belt, roller1, roller2, glow, screen, est, index: i });
    }

    // Cogumelo 3D
    const coguGroup = new THREE.Group();
    // Stem
    const stemGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.6, 12);
    const stemMat = new THREE.MeshStandardMaterial({ color: 0xf5f5dc });
    const stem = new THREE.Mesh(stemGeo, stemMat);
    stem.position.y = 0.3;
    stem.castShadow = true;
    coguGroup.add(stem);
    // Cap
    const capGeo = new THREE.SphereGeometry(0.4, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2);
    const capMat = new THREE.MeshStandardMaterial({ color: 0xe53935 });
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.y = 0.6;
    cap.castShadow = true;
    coguGroup.add(cap);
    // Spots
    const spotMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const spotGeo = new THREE.SphereGeometry(0.08, 8, 8);
    const spots = [[-0.2, 0.85, 0.15], [0.15, 0.9, -0.1], [0, 0.75, 0.25]];
    spots.forEach(p => { const s = new THREE.Mesh(spotGeo, spotMat); s.position.set(...p); coguGroup.add(s); });
    // Eyes
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
    eyeL.position.set(-0.08, 0.4, 0.2);
    coguGroup.add(eyeL);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
    eyeR.position.set(0.08, 0.4, 0.2);
    coguGroup.add(eyeR);
    // Legs
    const legMat = new THREE.MeshStandardMaterial({ color: 0x8d6e63 });
    const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.3, 8);
    const legL = new THREE.Mesh(legGeo, legMat);
    legL.position.set(-0.1, 0.05, 0);
    coguGroup.add(legL);
    const legR = new THREE.Mesh(legGeo, legMat);
    legR.position.set(0.1, 0.05, 0);
    coguGroup.add(legR);

    coguGroup.position.set(0, 0.35, 0);
    cogumeloMesh = { group: coguGroup, legL, legR };
    academiaScene.add(coguGroup);
}

function animateAcademia() {
    if (!academiaRunning) return;
    requestAnimationFrame(animateAcademia);

    const t = Date.now();

    for (const b of academiaBelts) {
        const unlocked = speed >= b.est.req;
        const active = currentEsteira === b.index;

        if (active && unlocked) {
            b.belt.material.color.setHex(0x1a1a1a);
            b.roller1.rotation.x += 0.2;
            b.roller2.rotation.x += 0.2;
            b.glow.material.emissiveIntensity = 0.6 + Math.sin(t * 0.006) * 0.4;
            b.screen.material.emissiveIntensity = 0.8 + Math.sin(t * 0.004) * 0.2;
            b.group.position.y = Math.sin(t * 0.003) * 0.01;
        } else if (unlocked) {
            b.belt.material.color.setHex(0x111111);
            b.glow.material.emissiveIntensity = 0.3;
            b.screen.material.emissiveIntensity = 0.3;
            b.group.position.y = 0;
        } else {
            b.belt.material.color.setHex(0x050505);
            b.glow.material.emissiveIntensity = 0.02;
            b.screen.material.emissiveIntensity = 0.05;
            b.group.position.y = 0;
        }
    }

    // Move cogumelo to active treadmill
    if (cogumeloMesh) {
        const targetX = (currentEsteira - 3) * 2.2;
        cogumeloMesh.group.position.x += (targetX - cogumeloMesh.group.position.x) * 0.08;
        // Running animation — legs swing
        const legSpeed = 0.012 * (ESTEIRAS[currentEsteira].bonus + 2);
        const legSwing = Math.sin(t * legSpeed) * 0.4;
        cogumeloMesh.legL.rotation.x = legSwing;
        cogumeloMesh.legR.rotation.x = -legSwing;
        // Bounce
        cogumeloMesh.group.position.y = 0.35 + Math.abs(Math.sin(t * legSpeed)) * 0.08;
    }

    academiaCamera.position.x = Math.sin(t * 0.0003) * 2;
    academiaCamera.lookAt(0, 1.5, 0);
    academiaRenderer.render(academiaScene, academiaCamera);
}

function startAutoSpeed() {
    if (autoSpeedInterval) clearInterval(autoSpeedInterval);
    autoSpeedInterval = setInterval(() => {
        if (academiaRunning) {
            speed += ESTEIRAS[currentEsteira].bonus;
            document.getElementById('speed-val').textContent = speed.toLocaleString();
            renderEsteiras();
        }
    }, 500);
}

function stopAutoSpeed() {
    if (autoSpeedInterval) { clearInterval(autoSpeedInterval); autoSpeedInterval = null; }
}

function renderEsteiras() {
    const hud = document.getElementById('esteira-hud');
    hud.innerHTML = '';
    document.getElementById('speed-val').textContent = speed.toLocaleString();
    for (let i = 0; i < ESTEIRAS.length; i++) {
        const est = ESTEIRAS[i];
        const unlocked = speed >= est.req;
        const active = currentEsteira === i;
        const btn = document.createElement('div');
        btn.className = 'est-btn' + (!unlocked ? ' locked' : '') + (active ? ' active' : '');
        btn.innerHTML = `<div class="est-b-name">${est.name}</div><div class="est-b-req">${est.req === 0 ? '🆓' : est.req.toLocaleString()}</div>`;
        if (unlocked) btn.onclick = () => { currentEsteira = i; renderEsteiras(); };
        hud.appendChild(btn);
    }
    const soon = document.createElement('div');
    soon.className = 'est-btn coming-soon';
    soon.innerHTML = '<div class="est-b-name">???</div><div class="est-b-req">Em breve...</div>';
    hud.appendChild(soon);
}

document.getElementById('btn-academia').onclick = () => {
    document.getElementById('academia-screen').style.display = 'block';
    if (!window.THREE) {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
        s.onload = () => { initAcademia3D(); academiaRunning = true; animateAcademia(); startAutoSpeed(); renderEsteiras(); };
        document.head.appendChild(s);
    } else {
        if (!academiaScene) initAcademia3D();
        academiaRunning = true;
        academiaRenderer.setSize(window.innerWidth, window.innerHeight);
        animateAcademia();
        startAutoSpeed();
        renderEsteiras();
    }
};
document.getElementById('academia-back').onclick = () => {
    document.getElementById('academia-screen').style.display = 'none';
    academiaRunning = false;
    stopAutoSpeed();
};

// Mega upgrade box
let megaLevel = 0;
let megaCost = 100067;
const upgradeBox2 = document.getElementById('upgrade-box2');

function updateUpgradeBox2() {
    if (score >= megaCost) {
        upgradeBox2.classList.remove('locked');
    } else {
        upgradeBox2.classList.add('locked');
    }
}

upgradeBox2.addEventListener('click', () => {
    if (score >= megaCost) {
        score -= megaCost;
        megaLevel++;
        clickPower += 1000;
        megaCost = 100067 * (megaLevel + 1);
        scoreEl.textContent = score;
        document.getElementById('up-level2').textContent = `Nível: ${megaLevel}`;
        document.getElementById('click-power').textContent = `Clique: +${clickPower}`;
        document.getElementById('up-cost2').textContent = `Custo: ${megaCost.toLocaleString()}`;
        updateUpgradeBox2();
    }
});

function checkMegaUpgrade() {
    updateUpgradeBox2();
}

// === CORRIDA MODE ===
let corridaFase = 1;
let corridaRunning = false;
let corridaCanvas, corridaCtx;
let racePlayer, raceEnemies, raceFinish, raceFrame;

const RACE_ENEMIES = [
    { name: 'Tartaruga', color: '#4caf50', baseSpeed: 1.5 },
    { name: 'Coelho', color: '#ff9800', baseSpeed: 2.5 },
    { name: 'Raposa', color: '#f44336', baseSpeed: 3.2 },
    { name: 'Guepardo', color: '#ffd700', baseSpeed: 4.0 },
    { name: 'Foguete', color: '#9c27b0', baseSpeed: 5.0 },
];

function startRace() {
    corridaCanvas = document.getElementById('corrida-canvas');
    corridaCanvas.width = window.innerWidth;
    corridaCanvas.height = window.innerHeight;
    corridaCtx = corridaCanvas.getContext('2d');
    raceFinish = corridaCanvas.width - 80;
    raceFrame = 0;

    const playerSpeed = 2 + (speed / 10000);
    racePlayer = { x: 50, y: corridaCanvas.height / 2 - 60, speed: playerSpeed, finished: false };

    raceEnemies = [];
    const numEnemies = Math.min(corridaFase + 1, 5);
    for (let i = 0; i < numEnemies; i++) {
        const e = RACE_ENEMIES[i % RACE_ENEMIES.length];
        const spd = e.baseSpeed + (corridaFase - 1) * 0.5 + Math.random() * 0.5;
        raceEnemies.push({
            x: 50, y: corridaCanvas.height / 2 - 60 + (i + 1) * 70,
            speed: spd, name: e.name, color: e.color, finished: false
        });
    }

    corridaRunning = true;
    document.getElementById('corrida-result').style.display = 'none';
    document.getElementById('corrida-fase').textContent = `Fase ${corridaFase}`;
    raceLoop();
}

function raceLoop() {
    if (!corridaRunning) return;
    requestAnimationFrame(raceLoop);
    raceFrame++;
    const ctx = corridaCtx;
    const w = corridaCanvas.width, h = corridaCanvas.height;

    // Background
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#87ceeb');
    grad.addColorStop(1, '#e0f7fa');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Track lanes
    const laneH = 60;
    const startY = racePlayer.y - 15;
    for (let i = 0; i < raceEnemies.length + 1; i++) {
        const y = startY + i * 70;
        ctx.fillStyle = i % 2 === 0 ? '#d4a373' : '#c8956c';
        ctx.fillRect(0, y, w, laneH);
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([20, 15]);
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        ctx.setLineDash([]);
    }

    // Finish line
    ctx.fillStyle = '#000';
    for (let fy = startY; fy < startY + (raceEnemies.length + 1) * 70; fy += 15) {
        const fx = raceFinish;
        ctx.fillStyle = (Math.floor(fy / 15) % 2 === 0) ? '#000' : '#fff';
        ctx.fillRect(fx, fy, 15, 15);
        ctx.fillStyle = (Math.floor(fy / 15) % 2 === 0) ? '#fff' : '#000';
        ctx.fillRect(fx + 15, fy, 15, 15);
    }

    // Move player (uses speed from academia!)
    if (!racePlayer.finished) {
        racePlayer.x += racePlayer.speed + Math.random() * 0.5;
        if (racePlayer.x >= raceFinish) { racePlayer.finished = true; }
    }

    // Move enemies
    for (const e of raceEnemies) {
        if (!e.finished) {
            e.x += e.speed + Math.random() * 0.8 - 0.3;
            if (e.x >= raceFinish) { e.finished = true; }
        }
    }

    // Draw player (cogumelo)
    ctx.save();
    ctx.translate(racePlayer.x, racePlayer.y + 25);
    ctx.scale(0.8, 0.8);
    // Stem
    ctx.fillStyle = '#f5f5dc';
    ctx.fillRect(-7, 2, 14, 18);
    // Cap
    ctx.fillStyle = '#e53935';
    ctx.beginPath(); ctx.ellipse(0, -4, 16, 14, 0, Math.PI, 0); ctx.fill();
    // Spots
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-7, -10, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -12, 3, 0, Math.PI * 2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(-4, 6, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, 6, 2.5, 0, Math.PI * 2); ctx.fill();
    // Legs running
    const legA = Math.sin(raceFrame * 0.3) * 4;
    ctx.fillStyle = '#8d6e63';
    ctx.fillRect(-6, 20 + legA, 5, 6);
    ctx.fillRect(1, 20 - legA, 5, 6);
    ctx.restore();
    // Name
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
    ctx.fillText('VOCÊ', racePlayer.x, racePlayer.y + 5);

    // Draw enemies
    for (const e of raceEnemies) {
        ctx.fillStyle = e.color;
        ctx.beginPath(); ctx.ellipse(e.x, e.y + 30, 18, 14, 0, 0, Math.PI * 2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(e.x - 5, e.y + 27, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e.x + 5, e.y + 27, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(e.x - 5, e.y + 27, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e.x + 5, e.y + 27, 2, 0, Math.PI * 2); ctx.fill();
        // Legs
        const el = Math.sin(raceFrame * 0.25 + raceEnemies.indexOf(e)) * 3;
        ctx.fillStyle = e.color;
        ctx.fillRect(e.x - 10, e.y + 42 + el, 6, 8);
        ctx.fillRect(e.x + 4, e.y + 42 - el, 6, 8);
        // Name
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
        ctx.fillText(e.name, e.x, e.y + 8);
    }

    // Update position
    let pos = 1;
    for (const e of raceEnemies) { if (e.x > racePlayer.x) pos++; }
    document.getElementById('corrida-pos').textContent = `Posição: ${pos}º`;

    // Check if race is over
    if (racePlayer.finished || raceEnemies.every(e => e.finished)) {
        corridaRunning = false;
        const won = pos === 1;
        document.getElementById('corrida-result').style.display = 'flex';
        document.getElementById('corrida-result-title').textContent = won ? '🏆 VOCÊ VENCEU!' : '💀 PERDEU!';
        document.getElementById('corrida-result-title').style.color = won ? '#ffd700' : '#f44336';
        document.getElementById('corrida-result-text').textContent = `Posição: ${pos}º de ${raceEnemies.length + 1} | Fase ${corridaFase}`;
        if (won) {
            score += corridaFase * 500;
            scoreEl.textContent = score;
            document.getElementById('corrida-next').style.display = 'inline-block';
        } else {
            document.getElementById('corrida-next').style.display = 'none';
        }
    }
}

document.getElementById('btn-corrida').onclick = () => {
    document.getElementById('corrida-screen').style.display = 'block';
    corridaFase = 1;
    startRace();
};
document.getElementById('corrida-back').onclick = () => {
    document.getElementById('corrida-screen').style.display = 'none';
    corridaRunning = false;
};
document.getElementById('corrida-next').onclick = () => {
    corridaFase++;
    startRace();
};
document.getElementById('corrida-menu').onclick = () => {
    document.getElementById('corrida-screen').style.display = 'none';
    corridaRunning = false;
};

// Click logic
function doClick(x, y) {
    score += clickPower;
    speed += ESTEIRAS[currentEsteira].bonus;
    scoreEl.textContent = score;
    document.getElementById('speed-val').textContent = speed.toLocaleString();

    if (score > best) {
        best = score;
        localStorage.setItem('capivara_clicker_best', best);
        document.getElementById('best').textContent = `Recorde: ${best}`;
    }

    updateUpgradeBox();
    updateUpgradeBox2();

    const effect = document.createElement('div');
    effect.className = 'click-effect';
    effect.textContent = `+${clickPower}`;
    effect.style.left = (x - 10) + 'px';
    effect.style.top = (y - 20) + 'px';
    capiDiv.appendChild(effect);
    setTimeout(() => effect.remove(), 800);
}

// All mouse buttons (left, right, middle)
capiDiv.addEventListener('contextmenu', e => e.preventDefault());
capiDiv.addEventListener('mousedown', (e) => { e.preventDefault(); doClick(e.offsetX, e.offsetY); });

// All keyboard keys
document.addEventListener('keydown', (e) => {
    if (document.getElementById('academia-screen').style.display === 'block') return;
    e.preventDefault();
    doClick(80 + Math.random() * 40, 80 + Math.random() * 40);
});
